<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Redirecting</title>
<script>
  var l = window.location;
  l.replace(
    l.protocol + "//" + l.hostname + (l.port ? ":" + l.port : "") +
    "/market-mellow-maker/?/" +
    l.pathname.slice(1) +
    (l.search ? "&" + l.search.slice(1) : "") +
    l.hash
  );
</script>
</head>
<body></body>
</html>
