<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Reel Maker Pro</title><style>

body{
background:#0d0d0d;
color:white;
font-family:Arial, sans-serif;
text-align:center;
padding:20px;
}

.container{
max-width:420px;
margin:auto;
background:#171717;
padding:20px;
border-radius:12px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:none;
background:#222;
color:white;
}

button{
width:100%;
padding:12px;
margin-top:12px;
border-radius:8px;
border:none;
background:#2e7d32;
color:white;
font-size:16px;
}

video{
width:100%;
margin-top:20px;
border-radius:10px;
}

canvas{
display:none;
}

.caption{
margin-top:15px;
color:#ccc;
}

.tags{
margin-top:10px;
color:#7CFC00;
}

</style></head><body><h1>🚀 AI Reel Maker PRO</h1><div class="container" id="loginBox"><h2>Login</h2><input id="email" placeholder="Email"><input id="password" type="password" placeholder="Password"><button onclick="login()">Login</button>

</div><div class="container" id="appBox" style="display:none"><h2>Create Reel</h2><input id="product" placeholder="Product name"><input id="price" placeholder="Price"><input id="offer" placeholder="Offer"><input type="file" id="image"><button onclick="generate()">Generate Reel</button>

<video id="video" controls></video>

<a id="download" style="display:none">
<button>Download Reel</button>
</a><div id="caption" class="caption"></div><div id="tags" class="tags"></div></div><canvas id="canvas" width="720" height="1280"></canvas>

<audio id="music" src="https://cdn.pixabay.com/audio/2022/03/15/audio_4c2fcb0f1a.mp3"></audio>

<script>

function login(){

alert("Login success")

document.getElementById("loginBox").style.display="none"
document.getElementById("appBox").style.display="block"

}

function generate(){

let product=document.getElementById("product").value
let price=document.getElementById("price").value
let offer=document.getElementById("offer").value
let file=document.getElementById("image").files[0]

if(!file){
alert("Upload product image")
return
}

let caption="🔥 "+product+" only ₹"+price+" | "+offer+" | Shop Now"

let hashtags="#reels #viralreels #instareels #shopping #trending"

document.getElementById("caption").innerText=caption

document.getElementById("tags").innerText=hashtags

let speech=new SpeechSynthesisUtterance(caption)

speechSynthesis.speak(speech)

let canvas=document.getElementById("canvas")

let ctx=canvas.getContext("2d")

let img=new Image()

img.onload=function(){

ctx.fillStyle="black"

ctx.fillRect(0,0,720,1280)

ctx.drawImage(img,60,250,600,600)

ctx.fillStyle="white"

ctx.font="60px Arial"

ctx.fillText(product,80,150)

ctx.font="50px Arial"

ctx.fillText("₹"+price,80,1000)

ctx.fillStyle="yellow"

ctx.fillText(offer,80,1100)

let stream=canvas.captureStream(30)

let recorder=new MediaRecorder(stream)

let chunks=[]

recorder.ondataavailable=e=>chunks.push(e.data)

recorder.onstop=e=>{

let blob=new Blob(chunks,{type:"video/webm"})

let url=URL.createObjectURL(blob)

let video=document.getElementById("video")

video.src=url

let dl=document.getElementById("download")

dl.href=url
dl.download="ai-reel.webm"

dl.style.display="block"

}

recorder.start()

document.getElementById("music").play()

setTimeout(()=>{

recorder.stop()

},3000)

}

img.src=URL.createObjectURL(file)

}

</script></body>
</html>
