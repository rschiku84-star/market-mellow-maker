<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Viral Studio</title>

<script src="https://code.responsivevoice.org/responsivevoice.js"></script>

<style>
body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
}

input,select{
padding:10px;
width:80%;
margin:10px;
border-radius:8px;
border:none;
}

button{
padding:12px 20px;
border:none;
border-radius:10px;
background:#06b6d4;
color:white;
font-size:16px;
margin:10px;
}

#output-screen{
margin-top:20px;
display:none;
}

video{
width:90%;
border-radius:12px;
}
</style>
</head>

<body>

<h2>🚀 AI Viral Studio</h2>

<input id="mainInput" placeholder="Enter topic (dog, nature, motivation)">

<br>

<select id="voiceType">
<option>Hindi Male</option>
<option>Hindi Female</option>
</select>

<br>

<button onclick="createReel()">🎬 CREATE VIRAL VIDEO</button>

<div id="status"></div>

<div id="output-screen">
<video id="v-play" controls loop></video>
<div id="v-caption"></div>
</div>

<script>

const PEXELS_KEY = "YOUR_PEXELS_API_KEY";

async function createReel(){

const input=document.getElementById("mainInput").value;
const status=document.getElementById("status");

if(!input){
alert("Enter topic first");
return;
}

status.innerText="⏳ AI searching video...";

try{

const res=await fetch(`https://api.pexels.com/videos/search?query=${input}&per_page=1`,{
headers:{
Authorization:PEXELS_KEY
}
});

if(!res.ok){
throw new Error("API error");
}

const data=await res.json();

if(data.videos.length===0){
status.innerText="❌ No video found";
return;
}

const video=data.videos[0].video_files.find(f=>f.quality==="sd");

const vid=document.getElementById("v-play");

vid.src=video.link;

document.getElementById("output-screen").style.display="block";

vid.play();

document.getElementById("v-caption").innerText=input;

responsiveVoice.speak(input);

status.innerText="✅ Viral Reel Generated";

}catch(err){

status.innerText="❌ Connection Error";

}

}

</script>

</body>
</html>
