<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Reel Maker V3</title><style>

body{
background:#0d0d0d;
color:white;
font-family:Arial;
text-align:center;
padding:20px;
}

.box{
max-width:420px;
margin:auto;
background:#171717;
padding:20px;
border-radius:12px;
margin-top:20px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:none;
background:#222;
color:white;
}

button{
width:100%;
padding:12px;
margin-top:12px;
border:none;
border-radius:8px;
background:#2e7d32;
color:white;
font-size:16px;
}

video{
width:100%;
margin-top:15px;
border-radius:10px;
}

canvas{
display:none;
}

</style></head><body><h1>🚀 AI Reel Maker V3</h1><div class="box" id="login"><h2>Login / Signup</h2><input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password"><button onclick="signup()">Signup</button>
<button onclick="login()">Login</button>

</div><div class="box" id="app" style="display:none"><h2>Create Reel</h2><input id="product" placeholder="Product name">
<input id="price" placeholder="Price">
<input id="offer" placeholder="Offer"><input type="file" id="image"><button onclick="generate()">Generate 5 Reels</button>

<video id="video1" controls></video>
<video id="video2" controls></video>
<video id="video3" controls></video>
<video id="video4" controls></video>
<video id="video5" controls></video>

<div id="caption"></div>
<div id="tags"></div></div><canvas id="canvas" width="720" height="1280"></canvas>

<script>

function signup(){
let email=document.getElementById("email").value
let pass=document.getElementById("pass").value
localStorage.setItem(email,pass)
alert("Account created")
}

function login(){
let email=document.getElementById("email").value
let pass=document.getElementById("pass").value
let saved=localStorage.getItem(email)

if(saved==pass){
document.getElementById("login").style.display="none"
document.getElementById("app").style.display="block"
}else{
alert("Wrong login")
}
}

function makeReel(videoId,text,img,price,offer){

let canvas=document.getElementById("canvas")
let ctx=canvas.getContext("2d")

ctx.fillStyle="black"
ctx.fillRect(0,0,720,1280)

ctx.drawImage(img,60,250,600,600)

ctx.fillStyle="white"
ctx.font="60px Arial"
ctx.fillText(text,80,150)

ctx.font="50px Arial"
ctx.fillText("₹"+price,80,1000)

ctx.fillStyle="yellow"
ctx.fillText(offer,80,1100)

let stream=canvas.captureStream(30)

let recorder=new MediaRecorder(stream)

let chunks=[]

recorder.ondataavailable=e=>chunks.push(e.data)

recorder.onstop=e=>{
let blob=new Blob(chunks,{type:"video/webm"})
let url=URL.createObjectURL(blob)
document.getElementById(videoId).src=url
}

recorder.start()

setTimeout(()=>{
recorder.stop()
},2000)

}

function generate(){

let product=document.getElementById("product").value
let price=document.getElementById("price").value
let offer=document.getElementById("offer").value
let file=document.getElementById("image").files[0]

let img=new Image()

img.onload=function(){

makeReel("video1",product,img,price,offer)
makeReel("video2","Buy "+product,img,price,offer)
makeReel("video3",product+" Sale",img,price,offer)
makeReel("video4","Limited Offer",img,price,offer)
makeReel("video5","Best Deal",img,price,offer)

}

img.src=URL.createObjectURL(file)

let caption="🔥 "+product+" only ₹"+price+" | "+offer+" | Shop Now"

document.getElementById("caption").innerText=caption

let tags="#reels #viral #trending #shopping #instareels"

document.getElementById("tags").innerText=tags

let speech=new SpeechSynthesisUtterance(caption)

speechSynthesis.speak(speech)

}

</script></body>
</html>
