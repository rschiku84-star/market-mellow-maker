<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ultra AI Reel SaaS</title><style>

body{
background:#0b0b0b;
color:white;
font-family:Arial;
text-align:center;
padding:20px;
}

.box{
background:#161616;
padding:20px;
border-radius:10px;
max-width:420px;
margin:auto;
margin-top:20px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:#222;
color:white;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:#00c853;
color:white;
font-size:16px;
}

video{
width:100%;
margin-top:20px;
border-radius:10px;
}

#app{display:none;}
#admin{display:none;}

</style></head><body><h1>🔥 Ultra AI Reel SaaS</h1><div id="loginBox" class="box"><h3>Login / Signup</h3><input id="email" placeholder="Email"><input id="password" type="password" placeholder="Password"><button onclick="signup()">Signup</button>

<button onclick="login()">Login</button>

</div><div id="app" class="box"><h3>Reel Generator</h3><input id="product" placeholder="Product Name"><input id="price" placeholder="Price"><input id="offer" placeholder="Offer"><input type="file" id="image"><button onclick="generate()">Generate Reel</button>

<button onclick="generate10()">🔥 Generate 10 Reels (PRO)</button>

<video id="video" controls></video>

<a id="download" style="display:none">
<button>Download Reel</button>
</a><div id="caption"></div><div id="hashtags"></div><button onclick="openAdmin()">Admin Panel</button>

<button onclick="logout()">Logout</button>

</div><div id="admin" class="box"><h3>Admin Dashboard</h3><p id="userCount"></p><p id="reelCount"></p><button onclick="closeAdmin()">Close</button>

</div><canvas id="canvas" width="720" height="1280" style="display:none"></canvas>

<script>


let reels = localStorage.getItem("reelsMade") || 0
let users = localStorage.getItem("users") || 0



function signup(){

let email=document.getElementById("email").value
let pass=document.getElementById("password").value

localStorage.setItem("userEmail",email)
localStorage.setItem("userPass",pass)

users++
localStorage.setItem("users",users)

alert("Signup success")

}



function login(){

let email=document.getElementById("email").value
let pass=document.getElementById("password").value

let savedEmail=localStorage.getItem("userEmail")
let savedPass=localStorage.getItem("userPass")

if(email==savedEmail && pass==savedPass){

document.getElementById("loginBox").style.display="none"
document.getElementById("app").style.display="block"

}else{

alert("Wrong login")

}

}



function logout(){

location.reload()

}



function generate(){

let product=document.getElementById("product").value
let price=document.getElementById("price").value
let offer=document.getElementById("offer").value
let file=document.getElementById("image").files[0]

if(!file){

alert("Upload image")

return

}

let canvas=document.getElementById("canvas")
let ctx=canvas.getContext("2d")

let img=new Image()

img.onload=function(){

let stream=canvas.captureStream(30)
let recorder=new MediaRecorder(stream)

let chunks=[]

recorder.ondataavailable=e=>chunks.push(e.data)

recorder.onstop=e=>{

let blob=new Blob(chunks,{type:"video/webm"})
let url=URL.createObjectURL(blob)

let video=document.getElementById("video")
video.src=url

let dl=document.getElementById("download")

dl.href=url
dl.download="reel.webm"
dl.style.display="block"

}

recorder.start()

ctx.fillStyle="black"
ctx.fillRect(0,0,720,1280)

ctx.drawImage(img,60,200,600,600)

ctx.fillStyle="white"
ctx.font="60px Arial"
ctx.fillText(product,80,150)

ctx.font="50px Arial"
ctx.fillText("₹"+price,80,950)

ctx.fillStyle="yellow"
ctx.fillText(offer,80,1050)

setTimeout(()=>{

recorder.stop()

},3000)

}

img.src=URL.createObjectURL(file)



let caption="🔥 "+product+" only ₹"+price+" | "+offer+" | Shop Now"

document.getElementById("caption").innerHTML="<h3>"+caption+"</h3>"


let tags="#viral #reels #trend #sale #shopnow"

document.getElementById("hashtags").innerHTML="<p>"+tags+"</p>"


reels++

localStorage.setItem("reelsMade",reels)

}



function generate10(){

let pro=localStorage.getItem("proUser")

if(pro!="yes"){

alert("🚫 PRO feature. Upgrade required.")

return

}

alert("10 reels generating...")

}



function openAdmin(){

document.getElementById("admin").style.display="block"

document.getElementById("userCount").innerText="Users: "+localStorage.getItem("users")

document.getElementById("reelCount").innerText="Reels created: "+localStorage.getItem("reelsMade")

}



function closeAdmin(){

document.getElementById("admin").style.display="none"

}



</script></body>
</html>
