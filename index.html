<!DOCTYPE html>
<html lang="hi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>DABIX MASTER STUDIO</title>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script src="https://code.responsivevoice.org/responsivevoice.js"></script>

<style>

body{
background:#0b0b0b;
color:#fff;
font-family:sans-serif;
text-align:center;
padding:20px;
}

.card{
max-width:420px;
margin:auto;
background:#161616;
padding:25px;
border-radius:20px;
}

.title{
font-size:26px;
font-weight:bold;
margin-bottom:20px;
}

.tabs{
display:flex;
gap:10px;
margin-bottom:20px;
}

.tab{
flex:1;
padding:10px;
border-radius:10px;
border:none;
background:#222;
color:white;
cursor:pointer;
}

.tab.active{
background:#55e6ee;
color:black;
}

input,textarea{
width:100%;
padding:12px;
margin:8px 0;
border-radius:10px;
border:none;
background:#202020;
color:white;
}

.btn{
width:100%;
padding:15px;
border:none;
border-radius:12px;
margin-top:10px;
font-weight:bold;
cursor:pointer;
}

.gen{background:#55e6ee;color:black;}
.save{background:#333;color:white;}
.pay{background:#ffc107;color:black;}

video{
width:100%;
margin-top:20px;
border-radius:15px;
}

#hashtags{
margin-top:15px;
font-size:12px;
color:#55e6ee;
}

</style>
</head>

<body>

<div class="card">

<div class="title">🔥 DABIX MASTER STUDIO</div>

<div class="tabs">
<button id="shopTab" class="tab active" onclick="setMode('shop')">Shop Mode</button>
<button id="creatorTab" class="tab" onclick="setMode('creator')">Creator Mode</button>
</div>

<div id="shopInputs">

<input id="pName" placeholder="Product Name">
<input id="pPrice" placeholder="Price">
<input id="pDiscount" placeholder="Discount">

</div>

<div id="creatorInputs" style="display:none">
<textarea id="storyInput" rows="4" placeholder="Viral story likho"></textarea>
</div>

<label>
<input type="checkbox" id="musicCheck" checked>
🎵 Music
</label>

<button class="btn gen" onclick="generate()">🔥 GENERATE REEL</button>

<button class="btn save" onclick="downloadVideo()">⬇ DOWNLOAD</button>

<button class="btn pay" onclick="pay()">💳 PRO</button>

<video id="video" controls muted loop></video>

<div id="hashtags"></div>

</div>

<audio id="music" src="https://www.bensound.com/bensound-music/bensound-actionable.mp3" loop></audio>

<script>

let mode="shop"

function setMode(m){

mode=m

document.getElementById("shopInputs").style.display=
m=="shop"?"block":"none"

document.getElementById("creatorInputs").style.display=
m=="creator"?"block":"none"

document.getElementById("shopTab").classList.toggle("active",m=="shop")
document.getElementById("creatorTab").classList.toggle("active",m=="creator")

}

async function generate(){

let text=""

if(mode=="shop"){

let name=document.getElementById("pName").value
let price=document.getElementById("pPrice").value
let disc=document.getElementById("pDiscount").value

text=`${name} sirf ₹${price} me ${disc} discount.`

}else{

text=document.getElementById("storyInput").value

}

if(!text)return alert("details bharo")

responsiveVoice.speak(text,"Hindi Male")

if(document.getElementById("musicCheck").checked){

document.getElementById("music").play()

}

let video=document.getElementById("video")

try{

const API="YOUR_PEXELS_KEY"

let res=await fetch(
`https://api.pexels.com/videos/search?query=shopping&per_page=1`,
{headers:{Authorization:API}}
)

let data=await res.json()

video.src=data.videos[0].video_files[0].link

}catch{

video.src="https://player.vimeo.com/external/403425024.sd.mp4"

}

video.play()

generateHashtags()

}

function generateHashtags(){

let tags=[
"#viral",
"#reels",
"#trending",
"#shopindia",
"#marketing",
"#instagramreels",
"#viralvideo"
]

document.getElementById("hashtags").innerText=tags.join(" ")

}

function downloadVideo(){

let v=document.getElementById("video").src
window.open(v)

}

function pay(){

var options={

key:"rzp_test_Spotf8L75715ps",

amount:"19900",

name:"Dabix Pro",

handler:function(){

alert("Payment Success")

}

}

var rzp=new Razorpay(options)
rzp.open()

}

</script>

</body>
</html>
