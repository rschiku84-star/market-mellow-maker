<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Reel Maker SaaS</title><style>
body{
background:#0b0f2a;
font-family:Arial;
color:white;
text-align:center;
padding:20px;
}

.box{
background:#111a44;
padding:20px;
border-radius:15px;
max-width:420px;
margin:auto;
}

input{
width:90%;
padding:12px;
border-radius:10px;
border:none;
margin:8px;
}

button{
width:90%;
padding:14px;
margin:6px;
border:none;
border-radius:12px;
font-size:16px;
color:white;
}

.login{background:#00a83e;}
.signup{background:#3b4bff;}
.gen{background:#00a83e;}
.download{background:#0057ff;}
.pro{background:#b65b00;}

video{
width:100%;
border-radius:12px;
margin-top:15px;
}
</style></head><body><div id="auth" class="box"><h2>Login / Signup</h2><input id="email" placeholder="Email">
<input id="pass" placeholder="Password" type="password"><button class="login" onclick="login()">Login</button>
<button class="signup" onclick="signup()">Signup</button>

<p id="authMsg"></p></div><div id="app" class="box" style="display:none;"><h2>🚀 AI Reel Maker</h2><input id="topic" placeholder="Enter reel topic"><input type="file" id="musicUpload" accept="audio/*"><button class="gen" onclick="makeReel()">Generate Reel</button>

<button class="download" onclick="downloadVideo()">Download Video</button>

<button class="pro" onclick="upgrade()">Upgrade PRO</button>

<p id="script"></p>
<p id="hashtags"></p><video id="video" controls></video>

<audio id="music"></audio>

</div><script>

function signup(){

let email=document.getElementById("email").value;
let pass=document.getElementById("pass").value;

localStorage.setItem("userEmail",email);
localStorage.setItem("userPass",pass);

document.getElementById("authMsg").innerText="Signup success. Login now.";

}

function login(){

let email=document.getElementById("email").value;
let pass=document.getElementById("pass").value;

if(email===localStorage.getItem("userEmail") &&
pass===localStorage.getItem("userPass")){

document.getElementById("auth").style.display="none";
document.getElementById("app").style.display="block";

}else{

document.getElementById("authMsg").innerText="Wrong login";

}

}

function makeReel(){

let topic=document.getElementById("topic").value;

document.getElementById("script").innerText=
"Hook: Viral reel about "+topic+
"\nStory: Amazing facts about "+topic+
"\nEnding: Follow for more reels.";

document.getElementById("hashtags").innerText=
"#reels #viralreels #instagramreels #ai #viral #trending";

let video=document.getElementById("video");

video.src="https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4";

video.play();

let musicFile=document.getElementById("musicUpload").files[0];

if(musicFile){

let musicURL=URL.createObjectURL(musicFile);

let music=document.getElementById("music");

music.src=musicURL;

music.play();

}

}

function downloadVideo(){

let video=document.getElementById("video").src;

let a=document.createElement("a");

a.href=video;

a.download="reel-video.mp4";

a.click();

}

function upgrade(){

window.location.href="https://rzp.io/l/YOURPAYMENTLINK";

}

</script></body>
</html>
