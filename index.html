<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Studio</title>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>

body{
background:#0f0f0f;
color:white;
font-family:sans-serif;
text-align:center;
}

button{
padding:14px;
margin:10px;
border:none;
border-radius:8px;
background:#2aa198;
color:white;
font-size:16px;
}

textarea{
width:90%;
height:100px;
background:#222;
color:white;
border:none;
padding:10px;
border-radius:8px;
}

video{
width:90%;
margin-top:20px;
border-radius:10px;
}

</style>
</head>

<body>

<h1>STUDIO</h1>

<button onclick="showShop()">Shop Mode</button>
<button onclick="showCreator()">Creator Mode</button>

<div id="shopBox" style="display:none">

<input type="file" id="shopImage">
<br>
<button onclick="shopVideo()">Generate Shop Reel</button>

</div>

<div id="creatorBox">

<textarea id="script" placeholder="Script likho..."></textarea>

<br>

<button onclick="generateReel()">🔥 GENERATE REEL</button>

</div>

<br>

<button onclick="downloadVideo()">⬇ DOWNLOAD</button>

<button onclick="payPro()">💳 PRO</button>

<br>

<video id="video" controls></video>

<script>

function showShop(){
document.getElementById("shopBox").style.display="block"
document.getElementById("creatorBox").style.display="none"
}

function showCreator(){
document.getElementById("shopBox").style.display="none"
document.getElementById("creatorBox").style.display="block"
}

function shopVideo(){

let file=document.getElementById("shopImage").files[0]

if(!file){
alert("Image upload karo")
return
}

let reader=new FileReader()

reader.onload=function(){
createLocalVideo(reader.result)
}

reader.readAsDataURL(file)

}

function generateReel(){

let prompt=document.getElementById("script").value
createLocalVideo(prompt)

}

function createLocalVideo(img){

let canvas=document.createElement("canvas")

canvas.width=360
canvas.height=640

let ctx=canvas.getContext("2d")

let stream=canvas.captureStream(30)

let rec=new MediaRecorder(stream)

let chunks=[]

rec.ondataavailable=e=>chunks.push(e.data)

rec.onstop=()=>{

let blob=new Blob(chunks,{type:"video/webm"})

let url=URL.createObjectURL(blob)

document.getElementById("video").src=url

}

rec.start()

let text=document.getElementById("script").value

let image=new Image()

if(img) image.src=img

let y=600

let draw=setInterval(()=>{
ctx.fillStyle="black"
ctx.fillRect(0,0,360,640)

ctx.fillStyle="white"
ctx.font="28px Arial"
ctx.fillText(text,20,300)




ctx.fillStyle="white"
ctx.font="24px sans-serif"
ctx.fillText(text,20,y)

y-=2

},30)

setTimeout(()=>{
clearInterval(draw)
rec.stop()
},8000)

}

async function createAIVideo(prompt){

const r = await fetch("/api/generateReel",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({prompt})
})

const d = await r.json()

console.log(d)

}

function downloadVideo(){

let video=document.getElementById("video")

let a=document.createElement("a")

a.href=video.src

a.download="reel.webm"

a.click()

}

function payPro(){

var options={
key:"YOUR_RAZORPAY_KEY",
amount:9900,
currency:"INR",
name:"DABIX PRO",
description:"Pro Upgrade"
}

var rzp=new Razorpay(options)
rzp.open()

}

</script>

</body>
</html>
