<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Reel Maker</title>

<style>
body{
font-family:Arial;
background:#0b1b33;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{
background:#142544;
padding:25px;
border-radius:12px;
width:320px;
text-align:center;
color:white;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border-radius:6px;
border:none;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

.generate{
background:#4CAF50;
color:white;
}

.pay{
background:#f39c12;
color:white;
}

canvas{
margin-top:15px;
max-width:100%;
border-radius:10px;
}

.download{
background:#3498db;
color:white;
display:none;
}
</style>
</head>

<body>

<div class="card">

<h2>AI Reel Maker</h2>

<input id="name" placeholder="Product Name">

<input id="price" placeholder="Price">

<input type="file" id="image">

<button class="generate" onclick="generateReel()">Generate Reel</button>

<button class="pay" onclick="pay()">Pay ₹199 & Unlimited</button>

<canvas id="canvas" width="360" height="640"></canvas>

<button id="download" class="download" onclick="download()">Download Reel</button>

</div>

<script>

let freeTrial = localStorage.getItem("trial") || 0

function generateReel(){

if(freeTrial >=3){
alert("Free trial finished. Please pay ₹199")
return
}

let name = document.getElementById("name").value
let price = document.getElementById("price").value
let file = document.getElementById("image").files[0]

if(!file){
alert("Upload image first")
return
}

let reader = new FileReader()

reader.onload = function(e){

let canvas = document.getElementById("canvas")
let ctx = canvas.getContext("2d")

let img = new Image()

img.onload=function(){

ctx.fillStyle="black"
ctx.fillRect(0,0,360,640)

ctx.drawImage(img,30,120,300,300)

ctx.fillStyle="white"
ctx.font="28px Arial"
ctx.fillText(name,40,480)

ctx.fillStyle="yellow"
ctx.font="26px Arial"
ctx.fillText("₹"+price,40,520)

document.getElementById("download").style.display="block"

}

img.src=e.target.result

}

reader.readAsDataURL(file)

freeTrial++
localStorage.setItem("trial",freeTrial)

alert("Free Trial Reel Generated ✅")

}

function download(){

let canvas=document.getElementById("canvas")

let link=document.createElement("a")
link.download="reel.png"
link.href=canvas.toDataURL()

link.click()

}

function pay(){

alert("Payment feature connect Razorpay later")

}

</script>

</body>
</html>
