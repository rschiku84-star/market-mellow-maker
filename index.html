<!DOCTYPE html>
<html>
<head>
<title>AI Reel Maker</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>

<style>

body{
background:#000;
font-family:Arial;
color:white;
text-align:center;
}

.box{
background:#111;
padding:20px;
margin:20px;
border-radius:10px;
}

input{
width:90%;
padding:12px;
margin:10px;
border-radius:6px;
border:none;
}

button{
width:90%;
padding:12px;
margin:10px;
background:#2e7d32;
color:white;
border:none;
border-radius:6px;
font-size:16px;
}

</style>

</head>

<body>

<h1>🤖 AI Reel Maker</h1>

<div class="box">

<h2>Login</h2>

<input id="email" placeholder="Email">

<input id="password" placeholder="Password" type="password">

<button onclick="signup()">Signup</button>

<button onclick="login()">Login</button>

</div>

<div class="box" id="reelBox" style="display:none">

<h2>Reel Generator</h2>

<input id="product" placeholder="Product name">

<input id="price" placeholder="Price">

<input id="offer" placeholder="Offer">

<input type="file" id="image">

<button onclick="generate()">Generate Reel</button>

<br><br>

<video id="video" controls width="300"></video>

</div>

<script>

const firebaseConfig = {

apiKey: "AIzaSyCH0r1dDjoZxOvoLqdSc0I",

authDomain: "ai-reel-maker-48d49.firebaseapp.com",

projectId: "ai-reel-maker-48d49",

storageBucket: "ai-reel-maker-48d49.appspot.com",

messagingSenderId: "407387852483",

appId: "1:407387852483:web:509e2c8b5"

};

firebase.initializeApp(firebaseConfig);

function signup(){

let email=document.getElementById("email").value

let pass=document.getElementById("password").value

firebase.auth().createUserWithEmailAndPassword(email,pass)

.then(()=>{

alert("Signup success")

})

.catch(e=>alert(e.message))

}

function login(){

let email=document.getElementById("email").value

let pass=document.getElementById("password").value

firebase.auth().signInWithEmailAndPassword(email,pass)

.then(()=>{

alert("Login success")

document.getElementById("reelBox").style.display="block"

})

.catch(e=>alert(e.message))

}

function generate(){

let product=document.getElementById("product").value

let price=document.getElementById("price").value

let offer=document.getElementById("offer").value

alert("Reel Generated for "+product)

}

</script>

</body>
</html>
