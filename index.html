<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultra AI Reel Maker</title><style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}

.box{
background:#1e293b;
padding:20px;
border-radius:12px;
max-width:420px;
margin:auto;
}

h2{
margin-bottom:20px;
}

input{
width:90%;
padding:12px;
margin:10px;
border-radius:8px;
border:none;
font-size:16px;
}

button{
width:90%;
padding:12px;
margin:8px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

.generate{
background:#22c55e;
color:white;
}

.download{
background:#3b82f6;
color:white;
}

.pay{
background:#f59e0b;
color:black;
font-weight:bold;
}

.clear{
background:#ef4444;
color:white;
}

#result{
margin-top:20px;
background:#020617;
padding:15px;
border-radius:10px;
text-align:left;
white-space:pre-line;
}

</style></head><body><div class="box"><h2>🚀 Ultra AI Reel Maker</h2><input type="text" id="topic" placeholder="Enter Reel Topic"><button class="generate" onclick="generateReel()">Generate Reel</button>

<button class="download" onclick="downloadScript()">Download Script</button>

<button class="pay" onclick="payment()">💳 Unlock PRO</button>

<button class="clear" onclick="clearText()">Clear</button>

<div id="result">
Your reel script will appear here...
</div></div><script>

function generateReel(){

let topic=document.getElementById("topic").value;

if(topic===""){
alert("Enter reel topic first");
return;
}

let hooks=[
"Stop scrolling! This will change your view about ",
"You won't believe this about ",
"Top secret about ",
"3 things you must know about ",
"This viral trick about "
];

let captions=[
"This is going viral 🔥",
"Everyone is talking about this!",
"Save this reel for later!",
"Watch till the end!",
"This trick will blow your mind!"
];

let hashtags=[
"#viralreel #reelsinstagram #trend",
"#instareels #viralcontent #growth",
"#contentcreator #reelideas #explore",
"#socialmediatips #viralvideo #instagramgrowth"
];

let hook=hooks[Math.floor(Math.random()*hooks.length)];
let caption=captions[Math.floor(Math.random()*captions.length)];
let hashtag=hashtags[Math.floor(Math.random()*hashtags.length)];

let script="🎬 Reel Topic: "+topic+"\n\n";

script+="🔥 Hook:\n";
script+=hook+topic+"\n\n";

script+="🎥 Content:\n";
script+="1️⃣ Interesting point about "+topic+"\n";
script+="2️⃣ Hidden fact about "+topic+"\n";
script+="3️⃣ Quick tip related to "+topic+"\n\n";

script+="📢 Caption:\n";
script+=caption+"\n\n";

script+="🏷 Hashtags:\n";
script+=hashtag+"\n\n";

script+="👉 CTA:\nFollow for more viral reels!";

document.getElementById("result").innerText=script;

}

function downloadScript(){

let text=document.getElementById("result").innerText;

let blob=new Blob([text],{type:"text/plain"});

let link=document.createElement("a");

link.href=URL.createObjectURL(blob);

link.download="reel-script.txt";

link.click();

}

function clearText(){

document.getElementById("result").innerText="Your reel script will appear here...";
document.getElementById("topic").value="";

}

function payment(){

window.location.href="https://your-payment-link.com";

}

</script></body>
</html>
