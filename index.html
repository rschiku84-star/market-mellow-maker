<!DOCTYPE html>
<html>
<head>
<title>AI Reel Maker</title>

<style>
body{
background:#07122c;
font-family:Arial;
color:white;
text-align:center;
padding:20px;
}

.box{
background:#0c1b3f;
padding:20px;
border-radius:15px;
max-width:400px;
margin:auto;
}

input{
width:90%;
padding:12px;
border-radius:10px;
border:none;
margin:10px 0;
}

button{
width:90%;
padding:14px;
border:none;
border-radius:12px;
margin:8px;
font-size:16px;
cursor:pointer;
}

.gen{background:#0dbb4f;color:white;}
.copy{background:#4c5cff;color:white;}
.download{background:#1e63ff;color:white;}
.pay{background:#c46a00;color:white;}

video{
width:100%;
margin-top:20px;
border-radius:10px;
}

</style>
</head>

<body>

<div class="box">

<h2>🚀 AI Reel Maker</h2>

<input id="topic" placeholder="Enter reel topic">

<button class="gen" onclick="makeVideo()">Generate Reel Video</button>

<button class="copy" onclick="copyScript()">Copy Script</button>

<button class="download" onclick="downloadVideo()">Download Video</button>

<button class="pay" onclick="upgrade()">💳 Upgrade PRO</button>

<p id="script"></p>

<video id="video" controls></video>

</div>

<script>

let videoUrl="";

async function makeVideo(){

let topic=document.getElementById("topic").value;

document.getElementById("script").innerText="Generating video...";

const response=await fetch("https://api.replicate.com/v1/predictions",{
method:"POST",
headers:{
"Authorization":"Token r8_W67DzWgLIfPv1q41HuKIlh0OT78I2gm07CwUH",
"Content-Type":"application/json"
},
body:JSON.stringify({
version:"83c9b8b3b2dba6b14b1d8ef5b5b1c2e90d3f0e6e5a9fbb9d1b0a3c8e2d3e4a1b",
input:{
prompt:topic
}
})
});

let data=await response.json();

let id=data.id;

checkVideo(id);

}

async function checkVideo(id){

let res=await fetch("https://api.replicate.com/v1/predictions/"+id,{
headers:{
"Authorization":"Token r8_W67DzWgLIfPv1q41HuKIlh0OT78I2gm07CwUH"
}
});

let data=await res.json();

if(data.status=="succeeded"){

videoUrl=data.output[0];

document.getElementById("video").src=videoUrl;

document.getElementById("script").innerText="Video Ready 🎉";

}else{

setTimeout(()=>checkVideo(id),3000);

}

}

function copyScript(){

navigator.clipboard.writeText(videoUrl);

alert("Video link copied");

}

function downloadVideo(){

if(videoUrl==""){
alert("Generate video first");
return;
}

window.open(videoUrl);

}

function upgrade(){

window.location.href="https://rzp.io/l/abc123";

}

</script>

</body>
</html>
