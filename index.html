<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>DABIX MASTER V9</title>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{
background:#0b0b0b;
color:white;
font-family:sans-serif;
text-align:center;
padding:20px;
}

.card{
max-width:420px;
margin:auto;
background:#161616;
padding:20px;
border-radius:20px;
}

.tabs{
display:flex;
gap:8px;
margin-bottom:10px;
}

.tab{
flex:1;
padding:10px;
border:none;
border-radius:10px;
background:#333;
color:white;
}

input{
width:100%;
padding:12px;
margin:6px 0;
border-radius:10px;
border:none;
background:#202020;
color:white;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
margin-top:8px;
cursor:pointer;
}

.product{
background:#1f1f1f;
padding:10px;
margin-top:10px;
border-radius:10px;
}

img{
width:100%;
border-radius:10px;
}

video{
width:100%;
margin-top:10px;
border-radius:10px;
}

#map{
height:250px;
margin-top:10px;
border-radius:10px;
}
</style>
</head>

<body>

<div class="card">

<h2>DABIX MASTER V9</h2>

<div id="loginBox">

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>
<button onclick="register()">Register</button>

</div>

<div id="app" style="display:none">

<div class="tabs">
<button onclick="setMode('shop')">Shop</button>
<button onclick="setMode('creator')">Creator</button>
<button onclick="setMode('map')">Nearby</button>
<button onclick="setMode('orders')">Orders</button>
</div>

<div id="shopMode">

<input id="pName" placeholder="Product Name">
<input id="pPrice" placeholder="Price">

<input type="file" id="imageUpload">

<img id="preview">

<button onclick="saveProduct()">Save Product</button>

</div>

<div id="creatorMode" style="display:none">

<input id="reelText" placeholder="Reel Text">

<button onclick="generateReel()">Generate Reel</button>

<video id="video" controls></video>

</div>

<div id="mapMode" style="display:none">

<div id="map"></div>

</div>

<div id="ordersMode" style="display:none">

<h3>Orders</h3>
<div id="orders"></div>

</div>

<h3>Products</h3>

<div id="products"></div>

<button onclick="checkout()">Checkout</button>

</div>

</div>

<script>

let users=JSON.parse(localStorage.getItem("users"))||[]
let products=JSON.parse(localStorage.getItem("products"))||[]
let orders=JSON.parse(localStorage.getItem("orders"))||[]

let cart=[]

function register(){

users.push({u:user.value,p:pass.value})

localStorage.setItem("users",JSON.stringify(users))

alert("Registered")

}

function login(){

let found=users.find(x=>x.u===user.value && x.p===pass.value)

if(found){

loginBox.style.display="none"
app.style.display="block"

renderProducts()
renderOrders()

}else{

alert("Login failed")

}

}

function setMode(m){

shopMode.style.display="none"
creatorMode.style.display="none"
mapMode.style.display="none"
ordersMode.style.display="none"

if(m==="shop")shopMode.style.display="block"
if(m==="creator")creatorMode.style.display="block"
if(m==="map")mapMode.style.display="block"
if(m==="orders")ordersMode.style.display="block"

}

imageUpload.onchange=function(e){

let file=e.target.files[0]

let reader=new FileReader()

reader.onload=function(){

preview.src=reader.result

}

reader.readAsDataURL(file)

}

function saveProduct(){

let p={

name:pName.value,
price:pPrice.value,
img:preview.src

}

products.push(p)

localStorage.setItem("products",JSON.stringify(products))

renderProducts()

}

function renderProducts(){

productsDiv.innerHTML=""

products.forEach((p,i)=>{

productsDiv.innerHTML+=`

<div class="product">

<img src="${p.img}">
<h3>${p.name}</h3>
<p>₹${p.price}</p>

<button onclick="addCart(${i})">Add to Cart</button>

</div>

`

})

}

function addCart(i){

cart.push(products[i])

alert("Added")

}

function checkout(){

let total=0

cart.forEach(p=>total+=Number(p.price))

if(total===0){

alert("Cart empty")

return

}

orders.push({items:cart,total})

localStorage.setItem("orders",JSON.stringify(orders))

renderOrders()

var options={

key:"YOUR_RAZORPAY_KEY",
amount:total*100,
currency:"INR",
name:"DABIX MASTER",
description:"Order Payment"

}

new Razorpay(options).open()

}

function renderOrders(){

ordersDiv.innerHTML=""

orders.forEach(o=>{

ordersDiv.innerHTML+=`

<div class="product">

<p>Order ₹${o.total}</p>

</div>

`

})

}

function generateReel(){

let canvas=document.createElement("canvas")

canvas.width=360
canvas.height=640

let ctx=canvas.getContext("2d")

ctx.fillStyle="black"
ctx.fillRect(0,0,360,640)

ctx.fillStyle="white"
ctx.font="28px sans-serif"

ctx.fillText(reelText.value,40,300)

let stream=canvas.captureStream(30)

let rec=new MediaRecorder(stream)

let chunks=[]

rec.ondataavailable=e=>chunks.push(e.data)

rec.onstop=()=>{

video.src=URL.createObjectURL(new Blob(chunks,{type:"video/webm"}))

}

rec.start()

setTimeout(()=>rec.stop(),30000)

}

navigator.geolocation.getCurrentPosition(pos=>{

let map=L.map('map').setView([pos.coords.latitude,pos.coords.longitude],13)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map)

L.marker([pos.coords.latitude,pos.coords.longitude]).addTo(map)

})

</script>

</body>
</html>
