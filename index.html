<!DOCTYPE html><html>
<head><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚀 AI Reel Maker</title><style>

body{
font-family:Arial;
background:#020617;
color:white;
text-align:center;
padding:20px;
}

.box{
background:#0f172a;
padding:20px;
border-radius:12px;
max-width:420px;
margin:auto;
}

input{
width:90%;
padding:12px;
margin:10px;
border-radius:8px;
border:none;
background:#1e293b;
color:white;
}

button{
width:90%;
padding:12px;
margin:8px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

.generate{background:#16a34a;color:white;}
.copy{background:#4f46e5;color:white;}
.download{background:#2563eb;color:white;}
.pay{background:#b45309;color:white;font-weight:bold;}

.badge{
background:#15803d;
padding:5px 10px;
border-radius:6px;
font-size:12px;
}

#result{
margin-top:20px;
background:#020617;
padding:15px;
border-radius:10px;
text-align:left;
white-space:pre-line;
}

</style></head><body><div class="box"><h2>🚀 AI Reel Maker</h2><span class="badge">FREE PLAN</span>

<br><br>

<input type="text" id="topic" placeholder="Enter Reel Topic"><button class="generate" onclick="generate()">Generate Reel</button>

<button class="copy" onclick="copyScript()">Copy Script</button>

<button class="download" onclick="downloadScript()">Download Script</button>

<button class="pay" onclick="pay()">💳 Upgrade PRO</button>

<div id="result">
Your reel script will appear here...
</div></div><script>

function generate(){

let topic=document.getElementById("topic").value;

if(topic===""){
alert("Topic likho");
return;
}

let script="🎬 Topic: "+topic+"\n\n";

script+="🔥 Hook: Stop scrolling! "+topic+"\n\n";

script+="🎥 Reel Idea:\n";
script+="1. Intro about "+topic+"\n";
script+="2. Ek interesting fact\n";
script+="3. Ek powerful tip\n\n";

script+="📢 Caption:\nThis reel will blow your mind 🔥\n\n";

script+="🏷 Hashtags:\n#reels #viral #instagram #trending";

document.getElementById("result").innerText=script;

}

function copyScript(){

let text=document.getElementById("result").innerText;

navigator.clipboard.writeText(text);

alert("Script copied");

}

function downloadScript(){

let text=document.getElementById("result").innerText;

let blob=new Blob([text],{type:"text/plain"});

let link=document.createElement("a");

link.href=URL.createObjectURL(blob);

link.download="reel-script.txt";

link.click();

}

function pay(){

window.open("https://rzp.io/l/YOUR_LINK","_blank");

}

</script></body>
</html>
