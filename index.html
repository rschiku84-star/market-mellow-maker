<!DOCTYPE html>
<html>
<head>
<title>AI Reel Maker</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
background:#07122c;
font-family:Arial;
color:white;
text-align:center;
padding:20px;
}

.box{
background:#0c1b3f;
padding:20px;
border-radius:15px;
max-width:400px;
margin:auto;
}

input{
width:90%;
padding:12px;
border-radius:10px;
border:none;
margin:10px 0;
}

button{
width:90%;
padding:14px;
border:none;
border-radius:12px;
margin:8px;
font-size:16px;
cursor:pointer;
}

.gen{background:#0dbb4f;color:white;}
.copy{background:#4c5cff;color:white;}
.download{background:#1e63ff;color:white;}
.pay{background:#c46a00;color:white;}

video{
width:100%;
margin-top:20px;
border-radius:10px;
}

</style>
</head>

<body>

<div class="box">

<h2>🚀 AI Reel Maker</h2>

<input id="topic" placeholder="Enter reel topic">

<button class="gen" onclick="makeVideo()">Generate Reel Video</button>

<button class="copy" onclick="copyScript()">Copy Script</button>

<button class="download" onclick="downloadVideo()">Download Video</button>

<button class="pay" onclick="upgrade()">💳 Upgrade PRO</button>

<p id="script"></p>

<video id="video" controls></video>

</div>

<script>

let videoUrl="";

function makeVideo(){

let topic=document.getElementById("topic").value;

videoUrl="https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4";

document.getElementById("video").src=videoUrl;

document.getElementById("script").innerText="Demo Reel created for: "+topic;

}

function copyScript(){

navigator.clipboard.writeText(videoUrl);

alert("Video link copied");

}

function downloadVideo(){

if(videoUrl==""){
alert("Generate video first");
return;
}

window.open(videoUrl);

}

function upgrade(){

window.location.href="https://rzp.io/l/YOURPAYMENTLINK";

}

</script>

</body>
</html>
