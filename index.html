<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>DABIX MASTER V3</title>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<style>

body{
background:#0b0b0b;
color:white;
font-family:sans-serif;
text-align:center;
padding:20px;
}

.card{
max-width:420px;
margin:auto;
background:#161616;
padding:25px;
border-radius:20px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:10px;
border:none;
background:#202020;
color:white;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
margin-top:10px;
font-weight:bold;
cursor:pointer;
}

.gen{background:#55e6ee;color:black;}
.save{background:#333;color:white;}
.pay{background:#ffc107;color:black;}

img{
width:100%;
margin-top:10px;
border-radius:10px;
}

.product{
background:#1f1f1f;
margin-top:10px;
padding:10px;
border-radius:10px;
}

</style>
</head>

<body>

<div class="card">

<h2>🔥 DABIX MASTER V3</h2>

<input id="pName" placeholder="Product Name">
<input id="pPrice" placeholder="Price">

<input type="file" id="imageUpload">

<img id="preview">

<button class="save" onclick="saveProduct()">🛒 Save Product</button>

<button class="gen" onclick="generateReel()">🎬 Generate Reel</button>

<button class="pay" onclick="payNow()">💳 Pay</button>

<div id="products"></div>

</div>

<script>

const firebaseConfig={
apiKey:"YOUR_KEY",
authDomain:"YOUR_DOMAIN",
projectId:"YOUR_PROJECT"
}

firebase.initializeApp(firebaseConfig)

const db=firebase.firestore()

imageUpload.onchange=function(e){

let file=e.target.files[0]

let reader=new FileReader()

reader.onload=function(){

preview.src=reader.result

}

reader.readAsDataURL(file)

}

function saveProduct(){

let name=document.getElementById("pName").value
let price=document.getElementById("pPrice").value
let img=preview.src

db.collection("products").add({

name:name,
price:price,
img:img

})

loadProducts()

}

function loadProducts(){

db.collection("products").get().then(snap=>{

products.innerHTML=""

snap.forEach(doc=>{

let p=doc.data()

products.innerHTML+=`
<div class="product">

<img src="${p.img}">
<h3>${p.name}</h3>
<p>₹${p.price}</p>

</div>
`

})

})

}

loadProducts()

function generateReel(){

alert("Reel generator connected")

}

function payNow(){

let price=document.getElementById("pPrice").value

var options={
key:"YOUR_RAZORPAY_KEY",
amount:price*100,
currency:"INR",
name:"DABIX MASTER",
description:"Product Payment"
}

var rzp=new Razorpay(options)

rzp.open()

}

</script>

</body>
</html>
