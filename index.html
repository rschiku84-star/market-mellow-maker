<!DOCTYPE html><html>
<head><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Reel Maker SaaS</title><style>

body{
font-family:Arial;
background:#020617;
color:white;
text-align:center;
padding:20px;
}

.box{
background:#1e293b;
padding:20px;
border-radius:12px;
max-width:420px;
margin:auto;
}

input{
width:90%;
padding:12px;
margin:10px;
border-radius:8px;
border:none;
}

button{
width:90%;
padding:12px;
margin:8px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

.generate{background:#22c55e;color:white;}
.copy{background:#6366f1;color:white;}
.download{background:#3b82f6;color:white;}
.pay{background:#f59e0b;color:black;font-weight:bold;}

.badge{
background:#22c55e;
padding:5px 10px;
border-radius:6px;
font-size:12px;
}

#result{
margin-top:20px;
background:#0f172a;
padding:15px;
border-radius:10px;
text-align:left;
white-space:pre-line;
}

</style></head><body><div class="box"><h2>🚀 AI Reel Maker</h2><span class="badge">FREE PLAN</span>

<br><br>

<input type="text" id="topic" placeholder="Enter Reel Topic"><button class="generate" onclick="generate()">Generate Reel</button>

<button class="copy" onclick="copyScript()">Copy Script</button>

<button class="download" onclick="downloadScript()">Download Script</button>

<button class="pay" onclick="pay()">💳 Upgrade PRO</button>

<div id="result">
Your reel script will appear here...
</div></div><script>

let limit=5;
let used=0;

function generate(){

if(used>=limit){
alert("Free limit finished. Upgrade PRO.");
return;
}

let topic=document.getElementById("topic").value;

if(topic===""){
alert("Enter topic first");
return;
}

used++;

let hooks=[
"Stop scrolling!",
"You won't believe this!",
"This trick is viral!",
"Secret revealed!",
"3 facts about"
];

let captions=[
"This is blowing up 🔥",
"Save this reel!",
"Watch till end!",
"This is crazy!"
];

let tags=[
"#reels #viral #trend",
"#instagramreels #explore",
"#contentcreator #viralvideo"
];

let hook=hooks[Math.floor(Math.random()*hooks.length)];
let caption=captions[Math.floor(Math.random()*captions.length)];
let tag=tags[Math.floor(Math.random()*tags.length)];

let script="🎬 Topic: "+topic+"\n\n";

script+="🔥 Hook: "+hook+" "+topic+"\n\n";

script+="🎥 Content:\n";
script+="1. Intro about "+topic+"\n";
script+="2. Interesting fact\n";
script+="3. Quick tip\n\n";

script+="📢 Caption:\n"+caption+"\n\n";

script+="🏷 Hashtags:\n"+tag+"\n\n";

script+="👉 Follow for more!";

document.getElementById("result").innerText=script;

}

function copyScript(){

let text=document.getElementById("result").innerText;

navigator.clipboard.writeText(text);

alert("Script copied");

}

function downloadScript(){

let text=document.getElementById("result").innerText;

let blob=new Blob([text],{type:"text/plain"});

let link=document.createElement("a");

link.href=URL.createObjectURL(blob);

link.download="reel-script.txt";

link.click();

}

function pay(){

window.location.href="YOUR_RAZORPAY_LINK";

}

</script></body>
</html>
