<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Reel Maker</title>
<style>
body{
background:#0f2747;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:#132f54;
padding:30px;
border-radius:15px;
width:300px;
text-align:center;
color:white;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border-radius:6px;
border:none;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

.generate{
background:#4CAF50;
color:white;
}

.pay{
background:#FFA500;
color:white;
}

#loading{
display:none;
margin-top:10px;
}

#result{
margin-top:15px;
display:none;
}

img{
width:100%;
border-radius:10px;
}
</style>
</head>

<body>

<div class="container">
<h2>AI Reel Maker</h2>

<input type="text" id="name" placeholder="Product Name">
<input type="text" id="price" placeholder="Price">

<input type="file" id="image">

<button class="generate" onclick="generateReel()">Generate Reel</button>

<button class="pay">Pay ₹199 & Unlimited</button>

<div id="loading">Generating Reel...</div>

<div id="result">
<h4>Your Reel Preview</h4>
<img id="preview">
<br><br>
<a id="download" download="reel.jpg">
<button>Download</button>
</a>
</div>

</div>

<script>

function generateReel(){

let file=document.getElementById("image").files[0]

if(!file){
alert("Upload product image")
return
}

document.getElementById("loading").style.display="block"

setTimeout(()=>{

let reader=new FileReader()

reader.onload=function(e){

document.getElementById("preview").src=e.target.result
document.getElementById("download").href=e.target.result

document.getElementById("loading").style.display="none"
document.getElementById("result").style.display="block"

}

reader.readAsDataURL(file)

},2000)

}

</script>

</body>
</html>
