<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Reel Maker PRO</title>

<style>

body{
font-family:Arial;
background:#0d2b45;
color:white;
text-align:center;
padding:20px;
}

.box{
background:#163a5f;
padding:20px;
border-radius:10px;
max-width:400px;
margin:auto;
}

input{
width:90%;
padding:10px;
margin:10px;
border-radius:6px;
border:none;
}

button{
width:90%;
padding:12px;
margin:10px;
border:none;
border-radius:6px;
font-size:16px;
}

.generate{
background:#22c55e;
color:white;
}

.download{
background:#22c55e;
color:white;
}

.pay{
background:#f59e0b;
color:white;
}

video{
width:100%;
margin-top:15px;
border-radius:8px;
}

</style>
</head>

<body>

<h2>AI Reel Maker PRO</h2>

<div class="box">

<input type="file" id="image">

<input type="text" id="text" placeholder="Enter Caption">

<input type="text" placeholder="Optional">

<button class="generate">Generate Reel</button>

<video id="video" controls></video>

<button class="download">Download Reel</button>

<button class="pay">Pay ₹199 Unlock</button>

</div>

<script>

const generateBtn=document.querySelector(".generate");
const video=document.getElementById("video");
const downloadBtn=document.querySelector(".download");

let videoURL="";

generateBtn.onclick=async()=>{

const file=document.getElementById("image").files[0];

if(!file){
alert("Upload image");
return;
}

const img=new Image();
img.src=URL.createObjectURL(file);

await img.decode();

const canvas=document.createElement("canvas");
canvas.width=720;
canvas.height=1280;

const ctx=canvas.getContext("2d");

const stream=canvas.captureStream(30);
const recorder=new MediaRecorder(stream);

let chunks=[];

recorder.ondataavailable=e=>chunks.push(e.data);

recorder.onstop=()=>{

const blob=new Blob(chunks,{type:"video/webm"});
videoURL=URL.createObjectURL(blob);

video.src=videoURL;

};

recorder.start();

let frame=0;

function draw(){

ctx.fillStyle="black";
ctx.fillRect(0,0,720,1280);

const zoom=1+(frame*0.0005);

const w=720*zoom;
const h=900*zoom;

ctx.drawImage(img,(720-w)/2,(900-h)/2,w,h);

frame++;

if(frame<900){

requestAnimationFrame(draw);

}else{

recorder.stop();

}

}

draw();

};

downloadBtn.onclick=()=>{

if(!videoURL){
alert("Generate reel first");
return;
}

const a=document.createElement("a");
a.href=videoURL;
a.download="ai-reel.webm";
a.click();

};

document.querySelector(".pay").onclick=()=>{

window.location.href="https://rzp.io/l/YOURPAYMENTLINK";

};

</script>

</body>
</html>
