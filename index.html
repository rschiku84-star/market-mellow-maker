<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Reel Maker PRO</title>

<style>

body{
font-family:Arial;
background:#0b2545;
color:white;
text-align:center;
padding:20px;
}

.container{
background:#132f4c;
padding:20px;
border-radius:10px;
max-width:400px;
margin:auto;
}

input{
width:90%;
padding:10px;
margin:10px;
border-radius:5px;
border:none;
}

button{
padding:12px;
margin:10px;
border:none;
border-radius:6px;
background:#22c55e;
color:white;
font-size:16px;
cursor:pointer;
width:90%;
}

video{
width:100%;
margin-top:10px;
}

</style>

</head>

<body>

<h2>AI Reel Maker PRO</h2>

<div class="container">

<input type="file" id="image">

<input type="text" id="name" placeholder="Product Name">

<input type="text" id="price" placeholder="Price">

<button onclick="generateReel()">Generate Reel</button>

<video id="video" controls></video>

<a id="downloadVideo" download="reel.webm">
<button>Download Reel</button>
</a>

<p id="loading" style="display:none">Generating Reel...</p>

</div>

<script>

function generateReel(){

let file=document.getElementById("image").files[0]

if(!file){
alert("Upload image first")
return
}

document.getElementById("loading").style.display="block"

let reader=new FileReader()

reader.onload=function(e){

let canvas=document.createElement("canvas")
let ctx=canvas.getContext("2d")

canvas.width=720
canvas.height=1280

let img=new Image()

img.onload=function(){

let stream=canvas.captureStream(30)

let recorder=new MediaRecorder(stream)

let chunks=[]

recorder.ondataavailable=e=>chunks.push(e.data)

recorder.onstop=function(){

let blob=new Blob(chunks,{type:"video/webm"})
let url=URL.createObjectURL(blob)

document.getElementById("video").src=url
document.getElementById("downloadVideo").href=url

document.getElementById("loading").style.display="none"

}

recorder.start()

let frame=0

let anim=setInterval(()=>{

ctx.fillStyle="#000"
ctx.fillRect(0,0,720,1280)

let scale=1+frame*0.002

ctx.drawImage(img,60,200,600*scale,600*scale)

ctx.fillStyle="white"
ctx.font="40px Arial"

let name=document.getElementById("name").value
let price=document.getElementById("price").value

ctx.fillText(name,100,950)
ctx.fillText("Price "+price,100,1000)

frame++

if(frame>900){
clearInterval(anim)
recorder.stop()
}

},33)

}

img.src=e.target.result

}

reader.readAsDataURL(file)

}

</script>

</body>
</html>
