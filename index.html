<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Reel Maker Pro</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b1f3a;
color:white;
}

header{
text-align:center;
padding:20px;
font-size:22px;
font-weight:bold;
background:#08172c;
}

.container{
max-width:380px;
margin:auto;
padding:20px;
}

.card{
background:#132f54;
padding:20px;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,0.4);
}

input{
width:100%;
padding:10px;
margin:8px 0;
border-radius:6px;
border:none;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

.generate{
background:#2ecc71;
color:white;
}

.pay{
background:#ffa502;
color:white;
}

#loading{
display:none;
text-align:center;
margin-top:10px;
}

video{
width:100%;
margin-top:15px;
border-radius:10px;
}

.section{
margin-top:30px;
}

.example{
background:#132f54;
padding:10px;
border-radius:8px;
margin-top:10px;
}

footer{
text-align:center;
padding:20px;
opacity:0.7;
}

</style>

</head>

<body>

<header>
AI Reel Maker PRO
</header>

<div class="container">

<div class="card">

<input type="text" id="name" placeholder="Product Name">

<input type="text" id="price" placeholder="Price">

<input type="file" id="image">

<button class="generate" onclick="generateReel()">Generate Reel</button>

<button class="pay" onclick="payNow()">Pay ₹199 & Unlimited</button>

<div id="loading">Generating AI Reel...</div>

<video id="video" controls></video>

<a id="downloadVideo" download="reel.webm">
<button>Download Reel</button>
</a>

</div>


<div class="section">

<h3>How it works</h3>

<div class="example">1️⃣ Upload product image</div>
<div class="example">2️⃣ Enter product name & price</div>
<div class="example">3️⃣ AI generates reel</div>
<div class="example">4️⃣ Download & post on Instagram</div>

</div>


<div class="section">

<h3>Example Use</h3>

<div class="example">Clothing shop reels</div>
<div class="example">Electronics product ads</div>
<div class="example">Local shop promotion</div>

</div>

</div>

<footer>
AI Reel Maker © 2026
</footer>


<script>

function payNow(){

window.open("https://rzp.io/l/demo123","_blank")

}

function generateReel(){

let file=document.getElementById("image").files[0]

if(!file){
alert("Upload product image")
return
}

document.getElementById("loading").style.display="block"

let reader=new FileReader()

reader.onload=function(e){

let canvas=document.createElement("canvas")
let ctx=canvas.getContext("2d")

let img=new Image()

img.onload=function(){

canvas.width=720
canvas.height=1280

ctx.fillStyle="#000"
ctx.fillRect(0,0,720,1280)

ctx.drawImage(img,60,200,600,600)

ctx.fillStyle="white"
ctx.font="40px Arial"

let name=document.getElementById("name").value
let price=document.getElementById("price").value

ctx.fillText(name,100,900)
ctx.fillText("Price: "+price,100,960)

let stream=canvas.captureStream(30)

let recorder=new MediaRecorder(stream)

let chunks=[]

recorder.ondataavailable=e=>chunks.push(e.data)

recorder.onstop=function(){

let blob=new Blob(chunks,{type:"video/webm"})

let url=URL.createObjectURL(blob)

document.getElementById("video").src=url
document.getElementById("downloadVideo").href=url

document.getElementById("loading").style.display="none"

}

recorder.start()

setTimeout(()=>{
recorder.stop()
},3000)

}

img.src=e.target.result

}

reader.readAsDataURL(file)

}

</script>

</body>
</html>
