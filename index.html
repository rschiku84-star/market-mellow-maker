<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>10X AI Reel Maker</title><style>
body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}

.box{
background:#1e293b;
padding:20px;
border-radius:12px;
max-width:420px;
margin:auto;
}

input{
width:90%;
padding:12px;
margin:10px;
border-radius:8px;
border:none;
}

button{
width:90%;
padding:12px;
margin:8px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

.generate{background:#22c55e;color:white;}
.download{background:#3b82f6;color:white;}
.copy{background:#6366f1;color:white;}
.pay{background:#f59e0b;color:black;font-weight:bold;}

#result{
margin-top:20px;
background:#020617;
padding:15px;
border-radius:10px;
text-align:left;
white-space:pre-line;
}
</style></head><body><div class="box"><h2>🚀 10X AI Reel Maker</h2><input type="text" id="topic" placeholder="Enter Reel Topic"><button class="generate" onclick="generateReel()">Generate Reel</button>

<button class="copy" onclick="copyScript()">Copy Script</button>

<button class="download" onclick="downloadScript()">Download</button>

<button class="pay" onclick="payment()">💳 Unlock PRO</button>

<div id="result">
Your reel script will appear here...
</div></div><script>

let freeLimit=3;
let used=0;

function generateReel(){

if(used>=freeLimit){
alert("Free limit finished. Please unlock PRO.");
return;
}

let topic=document.getElementById("topic").value;

if(topic===""){
alert("Enter topic first");
return;
}

used++;

let hooks=[
"Stop scrolling!",
"You won't believe this!",
"Top secret revealed!",
"This viral trick!",
"3 things about"
];

let captions=[
"This is going viral 🔥",
"Save this reel!",
"Watch till the end!",
"This will blow your mind!"
];

let hashtags=[
"#viralreel #instagramreels #trend",
"#reelideas #viralcontent #explore",
"#instagrowth #contentcreator #reels"
];

let hook=hooks[Math.floor(Math.random()*hooks.length)];
let caption=captions[Math.floor(Math.random()*captions.length)];
let hashtag=hashtags[Math.floor(Math.random()*hashtags.length)];

let script="🎬 Topic: "+topic+"\n\n";
script+="🔥 Hook: "+hook+" "+topic+"\n\n";
script+="🎥 Content:\n";
script+="1. First point about "+topic+"\n";
script+="2. Interesting fact about "+topic+"\n";
script+="3. Quick tip about "+topic+"\n\n";
script+="📢 Caption: "+caption+"\n\n";
script+="🏷 Hashtags: "+hashtag+"\n\n";
script+="👉 Follow for more reels!";

document.getElementById("result").innerText=script;

}

function downloadScript(){

let text=document.getElementById("result").innerText;

let blob=new Blob([text],{type:"text/plain"});

let link=document.createElement("a");

link.href=URL.createObjectURL(blob);

link.download="reel-script.txt";

link.click();

}

function copyScript(){

let text=document.getElementById("result").innerText;

navigator.clipboard.writeText(text);

alert("Script copied!");

}

function payment(){

window.location.href="https://your-payment-link.com";

}

</script></body>
</html>
