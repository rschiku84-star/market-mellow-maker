<!DOCTYPE html>
<html>
<head>
<title>AI Reel Maker</title>

<style>

body{
background:#000;
font-family:Arial;
color:white;
text-align:center;
}

.box{
background:#111;
padding:20px;
margin:20px;
border-radius:10px;
}

input{
width:90%;
padding:12px;
margin:10px;
border-radius:6px;
border:none;
}

button{
width:90%;
padding:12px;
margin:10px;
background:#2e7d32;
color:white;
border:none;
border-radius:6px;
font-size:16px;
}

canvas{
display:none;
}

</style>

</head>

<body>

<h1>🤖 AI Reel Maker</h1>

<div class="box">

<h2>Login</h2>

<input id="email" placeholder="Email">

<input id="password" placeholder="Password" type="password">

<button onclick="signup()">Signup</button>

<button onclick="login()">Login</button>

</div>

<div class="box" id="reelBox" style="display:none">

<h2>Reel Generator</h2>

<input id="product" placeholder="Product name">

<input id="price" placeholder="Price">

<input id="offer" placeholder="Offer">

<input type="file" id="image">

<button onclick="generate()">Generate Reel</button>

<br><br>

<video id="video" controls width="300"></video>

</div>

<canvas id="canvas" width="720" height="1280"></canvas>

<script>

function signup(){

alert("Signup success (demo)")

}

function login(){

alert("Login success")

document.getElementById("reelBox").style.display="block"

}

function generate(){

let product=document.getElementById("product").value
let price=document.getElementById("price").value
let offer=document.getElementById("offer").value
let file=document.getElementById("image").files[0]

let canvas=document.getElementById("canvas")
let ctx=canvas.getContext("2d")

let img=new Image()

img.onload=function(){

ctx.fillStyle="black"
ctx.fillRect(0,0,720,1280)

ctx.drawImage(img,60,200,600,600)

ctx.fillStyle="white"
ctx.font="50px Arial"
ctx.fillText(product,80,100)

ctx.fillText("Price: "+price,80,950)

ctx.fillStyle="yellow"
ctx.fillText("Offer: "+offer,80,1050)

let stream=canvas.captureStream(30)

let recorder=new MediaRecorder(stream)

let chunks=[]

recorder.ondataavailable=e=>chunks.push(e.data)

recorder.onstop=e=>{

let blob=new Blob(chunks,{type:"video/mp4"})

let url=URL.createObjectURL(blob)

document.getElementById("video").src=url

}

recorder.start()

setTimeout(()=>{

recorder.stop()

},3000)

}

img.src=URL.createObjectURL(file)

}

</script>

</body>
</html>
