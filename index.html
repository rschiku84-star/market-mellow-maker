<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Reel Maker - Pro</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <style>
        :root {
            --bg-color: #0b0f2a;
            --box-bg: #111a44;
            --accent: #90ab3e;
            --blue: #0057ff;
            --orange: #b65b00;
        }
        body {
            background: var(--bg-color);
            font-family: Arial, sans-serif;
            color: white;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        .box {
            background: var(--box-bg);
            padding: 25px;
            border-radius: 20px;
            max-width: 400px;
            width: 90%;
            margin: 40px auto;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.5);
        }
        input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            margin-bottom: 15px;
            box-sizing: border-box;
            background: #1c2555;
            color: white;
            outline: none;
        }
        button {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            cursor: pointer;
        }
        .gen { background: var(--accent); }
        .download { background: var(--blue); }
        .pro { background: var(--orange); }
        
        #result-area {
            display: none;
            margin-top: 20px;
            text-align: left;
        }
        .info-card {
            background: rgba(255,255,255,0.05);
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 10px;
            border-left: 4px solid var(--accent);
        }
        video {
            width: 100%;
            border-radius: 12px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>🎬 AI Reel Maker</h2>
    <input id="topic" type="text" placeholder="Enter reel topic...">
    
    <button class="gen" onclick="makeReel()">Generate Reel</button>
    
    <div id="result-area">
        <div class="info-card">
            <strong>Script:</strong><br>
            <span id="script-text"></span>
        </div>
        <div class="info-card">
            <strong>Hashtags:</strong><br>
            <span id="hashtag-text" style="color: #4da3ff;"></span>
        </div>
        <video id="video-player" controls></video>
        <button class="download" onclick="downloadVideo()">Download Video</button>
    </div>

    <button class="pro" onclick="payNow()">⭐ Upgrade to PRO (₹499)</button>
</div>

<script>
    // --- RAZORPAY SETUP ---
    // Maine aapki Key yahan daal di hai
    const RZP_KEY_ID = "rzp_test_SPotf8L7S7I5pS"; 

    function payNow() {
        var options = {
            "key": RZP_KEY_ID, 
            "amount": "49900", // ₹499 (Paise mein hota hai isliye 00 extra)
            "name": "AI Reel Maker Pro",
            "description": "Unlock Premium Features",
            "image": "https://cdn-icons-png.flaticon.com/512/1170/1170577.png",
            "handler": function (response){
                alert("Payment Successful! ID: " + response.razorpay_payment_id);
                // Yahan aap pro features unlock kar sakte hain
            },
            "prefill": {
                "name": "User Name",
                "email": "user@example.com"
            },
            "theme": { "color": "#b65b00" }
        };
        var rzp1 = new Razorpay(options);
        rzp1.open();
    }

    function makeReel() {
        const topic = document.getElementById("topic").value;
        if (!topic) { alert("Pehle topic likhein!"); return; }

        document.getElementById("result-area").style.display = "block";
        document.getElementById("script-text").innerText = "Viral idea about " + topic + "...";
        document.getElementById("hashtag-text").innerText = "#ai #reels #" + topic.replace(/\s+/g, '');

        const video = document.getElementById("video-player");
        video.src = "https://www.w3schools.com/html/mov_bbb.mp4";
        video.play();
    }

    function downloadVideo() {
        const video = document.getElementById("video-player");
        if (!video.src) return;
        const link = document.createElement('a');
        link.href = video.src;
        link.download = 'AI_Reel.mp4';
        link.click();
    }
</script>

</body>
</html>
