
<!DOCTYPE html>
<html>
<head>
<title>AI Reel Maker PRO+</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
background:#0f0f0f;
color:white;
font-family:Arial;
text-align:center;
padding:20px;
}

.card{
background:#1c1c1c;
padding:20px;
border-radius:12px;
max-width:350px;
margin:auto;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border-radius:6px;
border:none;
background:#2a2a2a;
color:white;
}

button{
width:100%;
padding:12px;
margin-top:8px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

.generate{
background:#2e7d32;
color:white;
}

.download{
background:#1976d2;
color:white;
}

canvas{
display:none;
}

video{
margin-top:20px;
width:300px;
border-radius:12px;
}

</style>

</head>

<body>

<h1>🤖 AI Reel Maker PRO+</h1>
<p>Create animated marketing reels</p>

<div class="card">

<input id="name" placeholder="Product Name">
<input id="price" placeholder="Price">
<input id="offer" placeholder="Offer">

<input type="file" id="image">

<input id="logo" type="file" placeholder="Upload Shop Logo">

<button class="generate" onclick="generateVideo()">Generate Reel</button>

<button class="download" onclick="downloadVideo()">Download Reel</button>

</div>

<canvas id="canvas" width="720" height="1280"></canvas>

<video id="preview" controls></video>

<audio id="music" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8a4a8c7c4.mp3?filename=upbeat-energetic-116199.mp3"></audio>

<script>

let videoBlob=null

function generateVideo(){

let name=document.getElementById("name").value
let price=document.getElementById("price").value
let offer=document.getElementById("offer").value
let file=document.getElementById("image").files[0]
let logoFile=document.getElementById("logo").files[0]

let canvas=document.getElementById("canvas")
let ctx=canvas.getContext("2d")

let stream=canvas.captureStream(30)

let recorder=new MediaRecorder(stream)

let chunks=[]

recorder.ondataavailable=e=>chunks.push(e.data)

recorder.onstop=e=>{

videoBlob=new Blob(chunks,{type:"video/webm"})

let url=URL.createObjectURL(videoBlob)

document.getElementById("preview").src=url

}

recorder.start()

document.getElementById("music").play()

let img=new Image()

let logo=new Image()

img.onload=function(){

if(logoFile){

logo.src=URL.createObjectURL(logoFile)

}

let frame=0

let interval=setInterval(()=>{

ctx.fillStyle="black"
ctx.fillRect(0,0,720,1280)

ctx.drawImage(img,60,200,600,600)

if(logo.src){

ctx.drawImage(logo,550,20,120,120)

}

ctx.fillStyle="white"
ctx.font="bold 60px Arial"

ctx.fillText(name,80,900)

ctx.font="50px Arial"
ctx.fillText("₹"+price,80,980)

ctx.fillStyle="yellow"
ctx.fillText(offer,80,1060)

frame++

if(frame>150){

clearInterval(interval)

recorder.stop()

document.getElementById("music").pause()

}

},80)

}

img.src=URL.createObjectURL(file)

}

function downloadVideo(){

if(!videoBlob){

alert("Generate video first")

return

}

let link=document.createElement("a")

link.href=URL.createObjectURL(videoBlob)

link.download="ai-reel.webm"

link.click()

}

</script>

</body>
</html>
