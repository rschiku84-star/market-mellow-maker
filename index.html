<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Reel Maker PRO</title>

<style>

body{
font-family: Arial;
background:#0d2b45;
color:white;
text-align:center;
padding:20px;
}

.box{
background:#163a5f;
padding:20px;
border-radius:10px;
max-width:400px;
margin:auto;
}

input{
width:90%;
padding:10px;
margin:10px;
border-radius:6px;
border:none;
}

button{
width:90%;
padding:12px;
margin:10px;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

.generate{
background:#22c55e;
color:white;
}

.download{
background:#3b82f6;
color:white;
}

#result{
margin-top:20px;
background:#0f172a;
padding:15px;
border-radius:8px;
}

</style>
</head>

<body>

<div class="box">

<h2>🎬 AI Reel Maker PRO</h2>

<input type="text" id="topic" placeholder="Enter Reel Topic">

<button class="generate" onclick="generateReel()">Generate Reel Idea</button>

<button class="download" onclick="downloadText()">Download Script</button>

<div id="result">
Your reel script will appear here...
</div>

</div>

<script>

function generateReel(){

let topic=document.getElementById("topic").value;

if(topic===""){
alert("Please enter a topic");
return;
}

let script="🎬 Reel Topic: "+topic+"\n\n";

script+="Hook: Did you know about "+topic+"?\n\n";

script+="Content:\n";
script+="• Point 1 about "+topic+"\n";
script+="• Point 2 about "+topic+"\n";
script+="• Point 3 about "+topic+"\n\n";

script+="CTA: Follow for more amazing reels!";

document.getElementById("result").innerText=script;

}

function downloadText(){

let text=document.getElementById("result").innerText;

let blob=new Blob([text],{type:"text/plain"});

let link=document.createElement("a");

link.href=URL.createObjectURL(blob);

link.download="reel-script.txt";

link.click();

}

</script>

</body>
</html>
