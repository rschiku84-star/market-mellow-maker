<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viral AI Content Studio</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script src="https://code.responsivevoice.org/responsivevoice.js"></script>
    <style>
        :root { --neon: #00f2ff; --bg: #0a0a0a; }
        body { background: var(--bg); font-family: sans-serif; color: white; margin: 0; padding: 15px; text-align: center; }
        .app-card { max-width: 450px; margin: auto; background: #121212; padding: 25px; border-radius: 30px; border: 1px solid #333; }
        .tab-box { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid #444; background: #222; color: #888; cursor: pointer; }
        .active-tab { background: var(--neon); color: #000; border: none; font-weight: bold; }
        textarea, select { width: 100%; padding: 14px; border-radius: 12px; background: #1a1a1a; color: white; margin-bottom: 15px; border: 1px solid #444; }
        .action-btn { width: 100%; padding: 18px; border: none; border-radius: 15px; font-weight: 900; cursor: pointer; background: var(--neon); color: #000; }
        #output-frame { position: relative; width: 100%; height: 500px; background: #000; border-radius: 20px; margin-top: 20px; display: none; overflow: hidden; border: 2px solid var(--neon); }
        #v-play { width: 100%; height: 100%; object-fit: cover; }
        .overlay-text { position: absolute; bottom: 30px; width: 100%; background: rgba(0,0,0,0.8); padding: 15px; font-size: 16px; box-sizing: border-box; }
        #log { font-size: 13px; color: var(--neon); margin: 10px 0; }
    </style>
</head>
<body>

<div class="app-card">
    <h2>✨ Viral AI Studio</h2>
    <div class="tab-box">
        <button id="tab-ai" class="tab active-tab" onclick="switchMode('ai')">Influencer AI</button>
        <button id="tab-shop" class="tab" onclick="switchMode('shop')">Shop Mode</button>
    </div>

    <textarea id="userInput" rows="4" placeholder="Apni puri story likhein (e.g. Ek bacha pahadi par thar chala raha hai...)"></textarea>
    
    <select id="voiceChoice">
        <option value="Hindi Male">Hindi Male Voice</option>
        <option value="Hindi Female">Hindi Female Voice</option>
    </select>

    <button class="action-btn" onclick="startGeneration()">🚀 CREATE VIRAL REEL</button>
    <div id="log"></div>

    <div id="output-frame">
        <video id="v-play" loop playsinline></video>
        <div class="overlay-text" id="v-caption"></div>
    </div>
</div>

<script>
    // AAPKI API KEY: hCRmy5XNPlbrU9Y2JuCrl8gBcJwQwCCgcPUQfuOYjzLh3YMVlyAwRav
    const API_KEY = "hCRmy5XNPlbrU9Y2JuCrl8gBcJwQwCCgcPUQfuOYjzLh3YMVlyAwRav";

    async function startGeneration() {
        const text = document.getElementById('userInput').value;
        const log = document.getElementById('log');
        if(!text) return alert("Pehle story likhein!");

        log.innerText = "⏳ AI Story dhoond raha hai...";
        
        // SMART SEARCH: Story mein se common words dhoondna
        const commonWords = ["mountain", "car", "thar", "nature", "forest", "city", "gym", "bike", "kids", "animals"];
        let searchQuery = "nature"; // Default agar kuch na mile
        
        const wordsInStory = text.toLowerCase().split(' ');
        for(let word of wordsInStory) {
            if(commonWords.includes(word)) {
                searchQuery = word;
                break;
            }
        }

        try {
            const response = await fetch(`https://api.pexels.com/videos/search?query=${searchQuery}&per_page=5&orientation=portrait`, {
                headers: { Authorization: API_KEY }
            });
            const data = await response.json();
            
            if(data.videos && data.videos.length > 0) {
                const vid = document.getElementById('v-play');
                // Randomly ek video choose karna list mein se
                const randomIndex = Math.floor(Math.random() * data.videos.length);
                vid.src = data.videos[randomIndex].video_files[0].link;
                
                document.getElementById('output-frame').style.display = 'block';
                vid.play();
                
                // Puri story bolne ke liye Voiceover
                responsiveVoice.speak(text, document.getElementById('voiceChoice').value);
                document.getElementById('v-caption').innerText = text.substring(0, 100) + "...";
                log.innerText = "✅ Reel Ready! Search Query: " + searchQuery;
            } else {
                log.innerText = "❌ No clips found. Try using words like 'Mountain' or 'Car'.";
            }
        } catch (err) {
            log.innerText = "❌ Error: API Key check karein.";
        }
    }
</script>
</body>
</html>
