<!DOCTYPE html>
<html>
<head>
<title>Ultra AI Reel Maker</title>

<style>

body{
background:#000;
color:white;
font-family:Arial;
text-align:center;
}

.box{
background:#111;
padding:20px;
margin:20px;
border-radius:10px;
}

input{
width:90%;
padding:12px;
margin:10px;
border-radius:6px;
border:none;
}

button{
width:90%;
padding:12px;
margin:10px;
background:#00c853;
color:white;
border:none;
border-radius:6px;
font-size:16px;
}

canvas{
display:none;
}

</style>

</head>

<body>

<h1>🚀 Ultra AI Reel Maker</h1>

<div class="box">

<h2>Login</h2>

<input id="email" placeholder="Email">

<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<div class="box" id="app" style="display:none">

<h2>Create Reel</h2>

<input id="product" placeholder="Product Name">

<input id="price" placeholder="Price">

<input id="offer" placeholder="Offer">

<input type="file" id="image">

<button onclick="generate()">Generate AI Reel</button>

<br><br>

<video id="video" controls width="320"></video>

<br>

<a id="download" style="display:none">
<button>Download Reel</button>
</a>

<div id="caption"></div>

</div>

<canvas id="canvas" width="720" height="1280"></canvas>

<audio id="music" src="https://cdn.pixabay.com/audio/2022/03/15/audio_4c2fcb0f1a.mp3"></audio>

<script>

function login(){

alert("Login success")

document.getElementById("app").style.display="block"

}

function generate(){

let product=document.getElementById("product").value
let price=document.getElementById("price").value
let offer=document.getElementById("offer").value
let file=document.getElementById("image").files[0]

let canvas=document.getElementById("canvas")
let ctx=canvas.getContext("2d")

let img=new Image()

img.onload=function(){

let frame=0

let stream=canvas.captureStream(30)

let recorder=new MediaRecorder(stream)

let chunks=[]

recorder.ondataavailable=e=>chunks.push(e.data)

recorder.onstop=e=>{

let blob=new Blob(chunks,{type:"video/webm"})

let url=URL.createObjectURL(blob)

let video=document.getElementById("video")

video.src=url

let dl=document.getElementById("download")

dl.href=url
dl.download="ai-reel.webm"
dl.style.display="block"

}

recorder.start()

document.getElementById("music").play()

let interval=setInterval(()=>{

ctx.fillStyle="black"
ctx.fillRect(0,0,720,1280)

ctx.drawImage(img,60,200,600,600)

ctx.fillStyle="white"
ctx.font="60px Arial"

ctx.fillText(product,80,200+frame)

ctx.fillText("₹"+price,80,950)

ctx.fillStyle="yellow"

ctx.fillText(offer,80,1050)

frame+=10

if(frame>200){

clearInterval(interval)

recorder.stop()

}

},100)

}

img.src=URL.createObjectURL(file)

let caption="🔥 "+product+" just ₹"+price+" | "+offer+" | Limited offer"

document.getElementById("caption").innerHTML="<h3>"+caption+"</h3>"

}

</script>

</body>
</html>
