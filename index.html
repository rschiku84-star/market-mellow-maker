<!DOCTYPE html>
<html>
<head>

<title>AI Reel Maker SaaS</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<style>

body{
background:#0f0f0f;
color:white;
font-family:Arial;
text-align:center;
padding:20px;
}

.card{
background:#1c1c1c;
padding:20px;
border-radius:12px;
max-width:350px;
margin:auto;
margin-top:20px;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border-radius:6px;
border:none;
background:#2a2a2a;
color:white;
}

button{
width:100%;
padding:12px;
margin-top:8px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
background:#2e7d32;
color:white;
}

video{
width:300px;
margin-top:20px;
border-radius:10px;
}

canvas{
display:none;
}

</style>

</head>

<body>

<h1>🤖 AI Reel Maker</h1>

<div class="card" id="loginBox">

<h2>Login</h2>

<input id="email" placeholder="Email">

<input id="password" type="password" placeholder="Password">

<button onclick="signup()">Signup</button>

<button onclick="login()">Login</button>

</div>

<div class="card" id="appBox" style="display:none">

<h2>Create Reel</h2>

<input id="name" placeholder="Product Name">

<input id="price" placeholder="Price">

<input id="offer" placeholder="Offer">

<input type="file" id="image">

<button onclick="generateVideo()">Generate Reel</button>

<button onclick="downloadVideo()">Download Reel</button>

</div>

<canvas id="canvas" width="720" height="1280"></canvas>

<video id="preview" controls></video>

<script>

const firebaseConfig = {
apiKey: "AIzaSyCH0r1dDjoZxOvoLqdSc0",
authDomain: "ai-reel-maker-48d49.firebaseapp.com",
projectId: "ai-reel-maker-48d49",
storageBucket: "ai-reel-maker-48d49.appspot.com",
messagingSenderId: "407387852483",
appId: "1:407387852483:web:509e2c8b5",
measurementId: "G-22LF249LQ2"
};

firebase.initializeApp(firebaseConfig);

const auth=firebase.auth();

function signup(){

let email=document.getElementById("email").value
let pass=document.getElementById("password").value

auth.createUserWithEmailAndPassword(email,pass)
.then(()=>alert("Signup success"))

}

function login(){

let email=document.getElementById("email").value
let pass=document.getElementById("password").value

auth.signInWithEmailAndPassword(email,pass)
.then(()=>{

document.getElementById("loginBox").style.display="none"

document.getElementById("appBox").style.display="block"

})

}

let videoBlob=null

function generateVideo(){

let name=document.getElementById("name").value
let price=document.getElementById("price").value
let offer=document.getElementById("offer").value
let file=document.getElementById("image").files[0]

let canvas=document.getElementById("canvas")
let ctx=canvas.getContext("2d")

let stream=canvas.captureStream(30)

let recorder=new MediaRecorder(stream)

let chunks=[]

recorder.ondataavailable=e=>chunks.push(e.data)

recorder.onstop=e=>{

videoBlob=new Blob(chunks,{type:"video/webm"})

let url=URL.createObjectURL(videoBlob)

document.getElementById("preview").src=url

}

recorder.start()

let img=new Image()

img.onload=function(){

let frame=0

let interval=setInterval(()=>{

ctx.fillStyle="black"
ctx.fillRect(0,0,720,1280)

ctx.drawImage(img,60,200,600,600)

ctx.fillStyle="white"
ctx.font="60px Arial"
ctx.fillText(name,80,900)

ctx.font="50px Arial"
ctx.fillText("₹"+price,80,980)

ctx.fillStyle="yellow"
ctx.fillText(offer,80,1060)

frame++

if(frame>150){

clearInterval(interval)

recorder.stop()

}

},80)

}

img.src=URL.createObjectURL(file)

}

function downloadVideo(){

if(!videoBlob){

alert("Generate video first")

return

}

let link=document.createElement("a")

link.href=URL.createObjectURL(videoBlob)

link.download="ai-reel.webm"

link.click()

}

</script>

</body>
</html>
