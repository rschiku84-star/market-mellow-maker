<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viral AI Content Studio</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script src="https://code.responsivevoice.org/responsivevoice.js"></script>
    <style>
        :root { --neon: #00f2ff; --gold: #ffcc00; --bg: #0a0a0a; }
        body { background: var(--bg); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: white; margin: 0; padding: 15px; text-align: center; }
        .app-card { max-width: 450px; margin: auto; background: #121212; padding: 25px; border-radius: 30px; border: 1px solid #333; box-shadow: 0 15px 50px rgba(0,242,255,0.15); }
        
        .tab-box { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid #444; background: #222; color: #888; cursor: pointer; font-weight: bold; }
        .active-tab { background: var(--neon); color: #000; border: none; }

        textarea, input, select { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #444; background: #1a1a1a; color: white; margin-bottom: 15px; box-sizing: border-box; }
        
        .action-btn { width: 100%; padding: 18px; border: none; border-radius: 15px; font-weight: 900; cursor: pointer; background: var(--neon); color: #000; text-transform: uppercase; letter-spacing: 1px; }
        .pro-btn { background: var(--gold); margin-top: 10px; }

        #output-frame { position: relative; width: 100%; height: 500px; background: #000; border-radius: 20px; margin-top: 20px; display: none; overflow: hidden; border: 2px solid var(--neon); }
        #v-play, #p-img { width: 100%; height: 100%; object-fit: cover; }
        
        .overlay-text { position: absolute; bottom: 30px; width: 100%; text-align: center; background: rgba(0,0,0,0.8); padding: 15px; font-size: 16px; font-weight: bold; color: #fff; box-sizing: border-box; z-index: 10; }
        .price-badge { position: absolute; top: 20px; left: 20px; background: #ff0044; padding: 6px 14px; border-radius: 6px; font-weight: 900; z-index: 11; }
        
        #log { font-size: 13px; color: var(--neon); margin: 10px 0; font-weight: 500; }
        .viral-tools { display: none; background: #1a1a1a; padding: 15px; border-radius: 15px; margin-top: 15px; text-align: left; border: 1px dashed #444; }
    </style>
</head>
<body>

<div class="app-card">
    <h2 style="margin-top:0;">✨ Viral AI Studio</h2>
    
    <div class="tab-box">
        <button id="tab-ai" class="tab active-tab" onclick="switchMode('ai')">Influencer AI</button>
        <button id="tab-shop" class="tab" onclick="switchMode('shop')">Shop Mode</button>
    </div>

    <textarea id="userInput" rows="3" placeholder="Script likhein (e.g. Red car driving in mountains)"></textarea>
    
    <div id="shopPanel" style="display:none;">
        <input type="file" id="shopImg" accept="image/*" onchange="loadShopImg(event)">
        <input type="text" id="shopPrice" placeholder="Price (e.g. ₹499)">
    </div>

    <div id="aiPanel">
        <select id="voiceChoice">
            <option value="Hindi Male">Hindi Male Voice</option>
            <option value="Hindi Female">Hindi Female Voice</option>
        </select>
    </div>

    <button class="action-btn" onclick="startGeneration()">🚀 CREATE VIRAL REEL</button>
    <div id="log"></div>

    <div id="output-frame">
        <video id="v-play" loop playsinline></video>
        <img id="p-img" style="display:none;">
        <div class="price-badge" id="v-price" style="display:none;"></div>
        <div class="overlay-text" id="v-caption"></div>
    </div>

    <div class="viral-tools" id="viral-kit">
        <strong style="color:var(--neon)">Viral Hashtags:</strong>
        <p id="hashtags" style="font-size: 12px; color:#ccc;"></p>
        <button class="action-btn" style="padding:10px; font-size:12px;" onclick="saveReel()">📥 DOWNLOAD TO PHONE</button>
    </div>

    <button class="action-btn pro-btn" onclick="handlePayment()">👑 GET PRO (REMOVE WATERMARK)</button>
</div>

<script>
    let mode = 'ai';
    const API_KEY = "hCRmy5XNPlbrU9Y2JuCrl8gBcJwQwCCgcPUQfuOYjzLh3YMVlyAwRav";

    function switchMode(m) {
        mode = m;
        document.getElementById('tab-ai').classList.toggle('active-tab', m === 'ai');
        document.getElementById('tab-shop').classList.toggle('active-tab', m === 'shop');
        document.getElementById('shopPanel').style.display = m === 'shop' ? 'block' : 'none';
        document.getElementById('aiPanel').style.display = m === 'ai' ? 'block' : 'none';
        document.getElementById('userInput').placeholder = m === 'ai' ? "Write script for AI Reel..." : "Describe your product...";
    }

    function loadShopImg(e) {
        const reader = new FileReader();
        reader.onload = () => {
            const img = document.getElementById('p-img');
            img.src = reader.result;
            img.style.display = 'block';
            document.getElementById('v-play').style.display = 'none';
        };
        reader.readAsDataURL(e.target.files[0]);
    }

    async function startGeneration() {
        const text = document.getElementById('userInput').value;
        const log = document.getElementById('log');
        const frame = document.getElementById('output-frame');
        
        if(!text) return alert("Pehle kuch likhiye!");
        
        log.innerText = "⚡ AI is processing your request...";
        frame.style.display = 'block';

        if(mode === 'ai') {
            // Extract only the first 2-3 words for better search results
            const searchTerms = text.split(' ').slice(0, 2).join(' ');
            try {
                const response = await fetch(`https://api.pexels.com/videos/search?query=${searchTerms}&per_page=1&orientation=portrait`, {
                    headers: { Authorization: API_KEY }
                });
                const data = await response.json();
                
                if(data.videos && data.videos.length > 0) {
                    const vid = document.getElementById('v-play');
                    vid.src = data.videos[0].video_files[0].link;
                    vid.style.display = 'block';
                    document.getElementById('p-img').style.display = 'none';
                    vid.play();
                    
                    responsiveVoice.speak(text, document.getElementById('voiceChoice').value);
                    document.getElementById('v-caption').innerText = text;
                    document.getElementById('v-price').style.display = 'none';
                    log.innerText = "🔥 Viral Reel Ready!";
                    document.getElementById('viral-kit').style.display = 'block';
                } else {
                    log.innerText = "❌ No video found. Try different words.";
                }
            } catch (err) {
                log.innerText = "❌ Connection Error.";
            }
        } else {
            // Local Shop Logic
            document.getElementById('v-price').innerText = document.getElementById('shopPrice').value;
            document.getElementById('v-price').style.display = 'block';
            document.getElementById('v-caption').innerText = text;
            log.innerText = "✅ Shop Reel Ready!";
            document.getElementById('viral-kit').style.display = 'block';
        }
        
        document.getElementById('hashtags').innerText = "#Viral #AI #Trending #Shorts #ReelsIndia #Marketing";
    }

    function saveReel() {
        const link = document.createElement('a');
        link.href = mode === 'ai' ? document.getElementById('v-play').src : document.getElementById('p-img').src;
        link.download = 'My_Viral_Reel.mp4';
        link.click();
    }

    function handlePayment() {
        new Razorpay({
            "key": "rzp_test_SPotf8L7S7I5pS",
            "amount": "19900",
            "name": "Market Mellow AI",
            "handler": function(res){ alert("Pro Access Granted!"); }
        }).open();
    }
</script>
</body>
</html>
