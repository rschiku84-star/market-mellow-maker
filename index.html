<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All-In-One Shop Video AI</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <style>
        :root { --primary: #12192c; --card: #1c2541; --accent: #00d4ff; --gold: #ffcc00; }
        body { background: var(--primary); font-family: 'Poppins', sans-serif; color: white; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: var(--card); padding: 20px; border-radius: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        
        h2 { color: var(--accent); margin-bottom: 5px; }
        p.subtitle { font-size: 12px; color: #aaa; margin-bottom: 20px; }

        label { display: block; text-align: left; font-size: 13px; margin: 10px 0 5px 5px; color: #ddd; }
        input, select { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #334155; background: #0b1121; color: white; box-sizing: border-box; font-size: 14px; }
        
        .btn-group { margin-top: 20px; }
        button { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 16px; margin-bottom: 10px; }
        .create-btn { background: var(--accent); color: #000; }
        .pay-btn { background: var(--gold); color: #000; }

        /* Video Preview Styling */
        #preview-box { 
            position: relative; width: 100%; height: 550px; background: #000; 
            border-radius: 20px; overflow: hidden; margin-top: 25px; display: none;
            border: 3px solid var(--accent);
        }
        #p-img { width: 100%; height: 100%; object-fit: cover; animation: moveBg 12s infinite alternate; }
        
        /* Overlays */
        .badge { position: absolute; top: 20px; left: 20px; background: #ff004c; padding: 6px 15px; border-radius: 8px; font-weight: 800; font-size: 18px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .offer-circle { position: absolute; top: 20px; right: 20px; width: 70px; height: 70px; background: var(--gold); color: #000; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: 900; font-size: 14px; line-height: 1; }
        .bottom-bar { position: absolute; bottom: 40px; width: 100%; background: rgba(0, 212, 255, 0.85); color: #000; padding: 15px 0; font-weight: 800; font-size: 20px; text-transform: uppercase; letter-spacing: 2px; }
        
        @keyframes moveBg { from { transform: scale(1) translate(0,0); } to { transform: scale(1.2) translate(-5px, -5px); } }
    </style>
</head>
<body>

<div class="container">
    <h2>🏪 Local Shop AI</h2>
    <p class="subtitle">Dukan ki photo daalein aur viral reel banayein</p>

    <label>Dukan ki Category Chunein:</label>
    <select id="shop-type">
        <option value="Clothes">👗 Fashion/Clothes</option>
        <option value="Mobile">📱 Mobile & Electronics</option>
        <option value="Jewelry">💎 Jewelry Shop</option>
        <option value="Grocery">🛒 Grocery/Kirana</option>
        <option value="Food">🍔 Restaurant/Cafe</option>
    </select>

    <label>Product ki Photo Upload Karein:</label>
    <input type="file" id="upload" accept="image/*" onchange="loadImg(event)">

    <label>Price (MRP):</label>
    <input type="text" id="price" placeholder="Example: ₹999">

    <label>Discount/Offer:</label>
    <input type="text" id="off" placeholder="Example: 50% OFF">

    <div class="btn-group">
        <button class="create-btn" onclick="buildReel()">🎬 Create Shop Reel</button>
        <button class="pay-btn" onclick="openPay()">⭐ Upgrade to Pro (₹199)</button>
    </div>

    <div id="preview-box">
        <img id="p-img" src="">
        <div class="badge" id="v-price"></div>
        <div class="offer-circle"><span id="v-off"></span><br><small>OFF</small></div>
        <div class="bottom-bar" id="v-tag">LIMITED STOCK</div>
        
        <audio id="v-music" loop src="https://www.bensound.com/bensound-music/bensound-energy.mp3"></audio>
    </div>
</div>

<script>
    const RZP_ID = "rzp_test_SPotf8L7S7I5pS";

    function loadImg(e) {
        const img = document.getElementById('p-img');
        img.src = URL.createObjectURL(e.target.files[0]);
    }

    function buildReel() {
        const price = document.getElementById('price').value;
        const off = document.getElementById('off').value;
        const type = document.getElementById('shop-type').value;

        if(!document.getElementById('p-img').src) { 
            alert("Bhai, pehle photo toh upload karo!"); return; 
        }

        // Set Values
        document.getElementById('v-price').innerText = price;
        document.getElementById('v-off').innerText = off.replace(/% OFF/g, '');
        document.getElementById('v-tag').innerText = "🔥 BEST " + type.toUpperCase() + " DEAL 🔥";

        // Show & Play
        document.getElementById('preview-box').style.display = "block";
        document.getElementById('v-music').play();
        
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    function openPay() {
        var options = {
            "key": RZP_ID,
            "amount": "19900", // ₹199 for local shops
            "name": "Local Shop AI Pro",
            "description": "Remove Watermark & High Quality",
            "handler": function (response){
                alert("Payment Done! ID: " + response.razorpay_payment_id);
            },
            "theme": { "color": "#00d4ff" }
        };
        new Razorpay(options).open();
    }
</script>

</body>
</html>
