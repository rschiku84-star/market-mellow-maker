<!DOCTYPE html>
<html>
<head>
<title>AI Reel Maker</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

body{
background:#0f0f0f;
color:white;
font-family:Arial;
text-align:center;
padding:20px;
}

.card{
background:#1c1c1c;
padding:20px;
border-radius:12px;
max-width:350px;
margin:auto;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border-radius:6px;
border:none;
background:#2a2a2a;
color:white;
}

button{
width:100%;
padding:12px;
margin-top:8px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

.generate{
background:#2e7d32;
color:white;
}

.download{
background:#1976d2;
color:white;
}

#reel{
margin-top:30px;
display:none;
}

.reel-box{
width:300px;
height:520px;
background:black;
margin:auto;
border-radius:14px;
padding:20px;
}

.reel-box img{
width:100%;
border-radius:10px;
}

.caption{
margin-top:10px;
font-size:14px;
color:#ccc;
}

</style>

</head>

<body>

<h1>🤖 AI Reel Maker</h1>
<p>Create Instagram marketing reels</p>

<div class="card">

<input id="name" placeholder="Product Name">
<input id="price" placeholder="Price">
<input id="offer" placeholder="Offer">
<input type="file" id="image">

<button class="generate" onclick="generate()">Generate Reel</button>

<button class="download" onclick="downloadReel()">Download Reel Poster</button>

</div>

<div id="reel">

<h2>Reel Preview</h2>

<div class="reel-box" id="poster">

<img id="preview">

<h2 id="pname"></h2>

<p id="pprice"></p>

<p id="poffer"></p>

<p class="caption" id="caption"></p>

</div>

</div>

<script>

function generate(){

let name=document.getElementById("name").value
let price=document.getElementById("price").value
let offer=document.getElementById("offer").value

document.getElementById("pname").innerText=name
document.getElementById("pprice").innerText="Only ₹"+price
document.getElementById("poffer").innerText="🔥 "+offer

let captions=[
"Limited time deal!",
"Best price today!",
"Shop now before stock ends!",
"Trending product 🔥",
"Special offer today!"
]

let random=captions[Math.floor(Math.random()*captions.length)]

document.getElementById("caption").innerText=random

let file=document.getElementById("image").files[0]

if(file){

let reader=new FileReader()

reader.onload=function(e){

document.getElementById("preview").src=e.target.result

}

reader.readAsDataURL(file)

}

document.getElementById("reel").style.display="block"

}

function downloadReel(){

let poster=document.getElementById("poster")

html2canvas(poster).then(canvas=>{

let link=document.createElement("a")

link.download="ai-reel.png"

link.href=canvas.toDataURL()

link.click()

})

}

</script>

</body>
</html>
