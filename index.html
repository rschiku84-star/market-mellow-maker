<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Viral Studio PRO</title>

<script src="https://code.responsivevoice.org/responsivevoice.js"></script>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>

body{
background:#020617;
color:white;
font-family:Arial;
text-align:center;
}

h1{
color:#22d3ee;
}

input,select{
padding:12px;
width:85%;
border-radius:10px;
border:none;
margin:10px;
}

button{
padding:14px 25px;
border-radius:12px;
border:none;
background:#06b6d4;
color:white;
font-size:16px;
margin:10px;
}

#paybtn{
background:#facc15;
color:black;
}

#output-screen{
display:none;
margin-top:20px;
}

#videoBox{
position:relative;
width:360px;
margin:auto;
}

video{
width:100%;
border-radius:12px;
}

#caption{
position:absolute;
bottom:15px;
left:10px;
right:10px;
background:rgba(0,0,0,0.6);
padding:8px;
border-radius:8px;
font-size:18px;
}

</style>
</head>

<body>

<h1>🚀 AI Viral Studio PRO</h1>

<input id="topic" placeholder="Enter viral topic (nature, dog, motivation)">

<br>

<select id="voice">
<option>Hindi Male</option>
<option>Hindi Female</option>
</select>

<br>

<button onclick="createReel()">🎬 CREATE VIRAL REEL</button>

<button id="paybtn" onclick="payNow()">⭐ UNLOCK PRO ₹199</button>

<div id="status"></div>

<div id="output-screen">

<div id="videoBox">

<video id="video" loop controls></video>

<div id="caption"></div>

</div>

<br>

<button onclick="downloadVideo()">📥 Download Video</button>

</div>

<script>

const PEXELS_KEY="YOUR_PEXELS_API_KEY";

async function createReel(){

const topic=document.getElementById("topic").value;
const status=document.getElementById("status");

if(!topic){
alert("Enter topic");
return;
}

status.innerText="⏳ AI searching viral video...";

try{

const res=await fetch(`https://api.pexels.com/videos/search?query=${topic}&per_page=1`,{
headers:{Authorization:PEXELS_KEY}
});

const data=await res.json();

if(data.videos.length==0){
status.innerText="❌ No video found";
return;
}

const video=data.videos[0].video_files.find(v=>v.quality==="sd");

const vid=document.getElementById("video");

vid.src=video.link;

document.getElementById("output-screen").style.display="block";

vid.play();

document.getElementById("caption").innerText=topic;

responsiveVoice.speak(topic,document.getElementById("voice").value);

status.innerText="✅ Viral Reel Generated";

}catch(e){

status.innerText="❌ Connection Error";

}

}

function downloadVideo(){

const url=document.getElementById("video").src;

const a=document.createElement("a");

a.href=url;

a.download="viral-reel.mp4";

a.click();

}

function payNow(){

var options={

key:"rzp_test_123456",

amount:"19900",

name:"AI Viral Studio PRO",

description:"Unlock PRO Features",

handler:function(){

alert("Payment Success");

}

};

var rzp=new Razorpay(options);

rzp.open();

}

</script>

</body>

</html>
