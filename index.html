<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viral AI Studio</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script src="https://code.responsivevoice.org/responsivevoice.js"></script>
    <style>
        :root { --accent: #00f2ff; --bg: #0d0d0d; }
        body { background: var(--bg); font-family: 'Inter', sans-serif; color: white; padding: 20px; text-align: center; }
        .app-container { max-width: 450px; margin: auto; background: #1a1a1a; padding: 25px; border-radius: 25px; border: 1px solid #333; }
        textarea, select { width: 100%; padding: 15px; border-radius: 12px; background: #000; color: #00f2ff; border: 1px solid #444; margin-bottom: 15px; }
        .btn { width: 100%; padding: 18px; border-radius: 15px; border: none; font-weight: 800; cursor: pointer; background: var(--accent); color: #000; text-transform: uppercase; }
        #video-preview { width: 100%; height: 500px; background: #000; border-radius: 20px; margin-top: 20px; position: relative; display: none; overflow: hidden; border: 2px solid var(--accent); }
        video { width: 100%; height: 100%; object-fit: cover; }
        .overlay { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.7); padding: 15px; font-size: 14px; box-sizing: border-box; }
        #status-msg { font-size: 12px; color: var(--accent); margin-top: 10px; }
    </style>
</head>
<body>

<div class="app-container">
    <h2>🚀 AI Viral Studio</h2>
    <textarea id="storyInput" rows="4" placeholder="Apni story likhein... (e.g. Car in the city)"></textarea>
    
    <select id="voiceSet">
        <option value="Hindi Male">Hindi Male Voice</option>
        <option value="Hindi Female">Hindi Female Voice</option>
    </select>

    <button class="btn" onclick="makeMagic()">🎬 Generate Viral Reel</button>
    <div id="status-msg"></div>

    <div id="video-preview">
        <video id="outputVideo" loop playsinline muted></video>
        <div class="overlay" id="textOverlay"></div>
    </div>
</div>

<script>
    const MY_KEY = "hCRmy5XNPlbrU9Y2JuCrl8gBcJwQwCCgcPUQfuOYjzLh3YMVlyAwRav";

    async function makeMagic() {
        const input = document.getElementById('storyInput').value;
        const msg = document.getElementById('status-msg');
        if(!input) return alert("Kuch toh likho!");

        msg.innerText = "⏳ AI is finding the best clips...";
        
        // Simple Logic: Puri story se keyword nikalna
        let query = "nature"; 
        const keywords = ["car", "mountain", "bike", "forest", "city", "gym", "ocean", "technology"];
        keywords.forEach(word => { if(input.toLowerCase().includes(word)) query = word; });

        try {
            const res = await fetch(`https://api.pexels.com/videos/search?query=${query}&per_page=1&orientation=portrait`, {
                headers: { Authorization: MY_KEY }
            });
            const data = await res.json();

            if(data.videos.length > 0) {
                const v = document.getElementById('outputVideo');
                v.src = data.videos[0].video_files[0].link;
                document.getElementById('video-preview').style.display = 'block';
                v.play();
                
                // Voiceover
                responsiveVoice.speak(input, document.getElementById('voiceSet').value);
                document.getElementById('textOverlay').innerText = input;
                msg.innerText = "✅ Reel Generated! (Video: " + query + ")";
            } else {
                msg.innerText = "❌ No video found. Try simpler words.";
            }
        } catch(e) {
            msg.innerText = "❌ Connection Error. Check API Key.";
        }
    }
</script>
</body>
</html>
