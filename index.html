<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>DABIX MASTER V11</title>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>

body{
background:#0b0b0b;
color:white;
font-family:sans-serif;
text-align:center;
padding:20px;
}

.container{
max-width:420px;
margin:auto;
background:#161616;
padding:20px;
border-radius:20px;
}

input{
width:100%;
padding:10px;
margin:6px 0;
border-radius:10px;
border:none;
background:#202020;
color:white;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
margin-top:6px;
}

.videoCard{
background:#1f1f1f;
padding:10px;
margin-top:10px;
border-radius:10px;
}

video{
width:100%;
border-radius:10px;
}

img{
width:100%;
border-radius:10px;
}

</style>

</head>

<body>

<div class="container">

<h2>DABIX MASTER V11</h2>

<h3>Shop Upload</h3>

<input id="pName" placeholder="Product Name">

<input id="pPrice" placeholder="Price">

<input type="file" id="imgUpload">

<img id="preview">

<button onclick="uploadProduct()">Upload Product</button>

<h3>Creator Feed</h3>

<div id="feed"></div>

<h3>Orders</h3>

<div id="orders"></div>

</div>

<script>

let products=JSON.parse(localStorage.getItem("products"))||[]
let orders=JSON.parse(localStorage.getItem("orders"))||[]

imgUpload.onchange=function(e){

let file=e.target.files[0]

let reader=new FileReader()

reader.onload=function(){

preview.src=reader.result

}

reader.readAsDataURL(file)

}

function uploadProduct(){

let name=pName.value
let price=pPrice.value
let img=preview.src

createVideoFromImage(img,name,price)

}

function createVideoFromImage(imgSrc,name,price){

let canvas=document.createElement("canvas")
canvas.width=360
canvas.height=640

let ctx=canvas.getContext("2d")

let img=new Image()

img.src=imgSrc

img.onload=function(){

let stream=canvas.captureStream(30)

let rec=new MediaRecorder(stream)

let chunks=[]

rec.ondataavailable=e=>chunks.push(e.data)

rec.onstop=()=>{

let blob=new Blob(chunks,{type:"video/webm"})
let url=URL.createObjectURL(blob)

let product={

name:name,
price:price,
video:url,
likes:0

}

products.push(product)

localStorage.setItem("products",JSON.stringify(products))

renderFeed()

}

rec.start()

let y=600

let anim=setInterval(()=>{

ctx.clearRect(0,0,360,640)

ctx.drawImage(img,0,0,360,640)

ctx.fillStyle="white"
ctx.font="28px sans-serif"

ctx.fillText(name,40,y)

y-=2

if(y<300)y=300

},30)

setTimeout(()=>{

clearInterval(anim)

rec.stop()

},30000)

}

}

function renderFeed(){

feed.innerHTML=""

products.forEach((p,i)=>{

feed.innerHTML+=`

<div class="videoCard">

<video controls loop src="${p.video}"></video>

<h3>${p.name}</h3>

<p>₹${p.price}</p>

<button onclick="like(${i})">❤️ ${p.likes}</button>

<button onclick="buy(${i})">Buy</button>

</div>

`

})

}

function like(i){

products[i].likes++

localStorage.setItem("products",JSON.stringify(products))

renderFeed()

}

function buy(i){

let price=products[i].price

var options={

key:"YOUR_RAZORPAY_KEY",

amount:price*100,

currency:"INR",

name:"DABIX MASTER",

description:"Product Purchase"

}

var rzp=new Razorpay(options)

rzp.open()

orders.push(products[i])

localStorage.setItem("orders",JSON.stringify(orders))

renderOrders()

}

function renderOrders(){

orders.innerHTML=""

orders.forEach(o=>{

orders.innerHTML+=`

<div class="videoCard">

<p>${o.name} ₹${o.price}</p>

</div>

`

})

}

renderFeed()

renderOrders()

</script>

</body>

</html>
