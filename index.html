<script>

function showShop(){
document.getElementById("shopBox").style.display="block"
document.getElementById("creatorBox").style.display="none"
}

function showCreator(){
document.getElementById("shopBox").style.display="none"
document.getElementById("creatorBox").style.display="block"
}

function shopVideo(){

let file=document.getElementById("shopImage").files[0]

if(!file){
alert("Image upload karo")
return
}

let reader=new FileReader()

reader.onload=function(){
createLocalVideo(reader.result)
}

reader.readAsDataURL(file)

}

function generateReel(){

let prompt=document.getElementById("script").value
createAIVideo(prompt)

}

function createLocalVideo(img){

let canvas=document.createElement("canvas")

canvas.width=360
canvas.height=640

let ctx=canvas.getContext("2d")

let stream=canvas.captureStream(30)

let rec=new MediaRecorder(stream)

let chunks=[]

rec.ondataavailable=e=>chunks.push(e.data)

rec.onstop=()=>{

let blob=new Blob(chunks,{type:"video/webm"})

let url=URL.createObjectURL(blob)

document.getElementById("video").src=url

}

rec.start()

let text=document.getElementById("script").value

let image=new Image()

if(img) image.src=img

let y=600

let draw=setInterval(()=>{

ctx.fillStyle="black"
ctx.fillRect(0,0,360,640)

if(img){
ctx.drawImage(image,0,0,360,640)
}

ctx.fillStyle="white"
ctx.font="24px sans-serif"
ctx.fillText(text,20,y)

y-=2

},30)

setTimeout(()=>{
clearInterval(draw)
rec.stop()
},8000)

}

async function createAIVideo(prompt){

const r = await fetch("/api/generateReel",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({prompt})
})

const d = await r.json()

console.log(d)

}

function downloadVideo(){

let video=document.getElementById("video")

let a=document.createElement("a")

a.href=video.src

a.download="reel.webm"

a.click()

}

function payPro(){

var options={
key:"YOUR_RAZORPAY_KEY",
amount:9900,
currency:"INR",
name:"DABIX PRO",
description:"Pro Upgrade"
}

var rzp=new Razorpay(options)
rzp.open()

}

</script>
