<head><meta name="viewport" content="width=device-width,initial-scale=1"><title>DABIX MASTER STUDIO</title><script src="https://checkout.razorpay.com/v1/checkout.js"></script><style>

}

}

margin-top:10px;

</style></head><body><div class="card"><h2>🔥 DABIX MASTER STUDIO</h2><div class="tabs"><button class="tab" onclick="showShop()">Shop Mode</button>

<button class="tab" style="background:#56d1d6" onclick="showCreator()">Creator Mode</button>

</div><!-- SHOP MODE --><div id="shopBox" style="display:none"><input id="pName" placeholder="Product Name"><input id="pPrice" placeholder="Price"><input type="file" id="shopImage"><button class="generate" onclick="shopVideo()">🎬 GENERATE PRODUCT VIDEO

</button></div><!-- CREATOR MODE --><div id="creatorBox"><textarea id="script">

Laptop / mobile use करते हुए
Dialogue:
"Par kuch log isi mobile se paisa bhi kama rahe hain."

</textarea><br><label>
<input type="checkbox" id="music" checked>
🎵 Music
</label><button class="generate" onclick="generateReel()">🔥 GENERATE REEL

</button><button class="download" onclick="downloadVideo()">⬇ DOWNLOAD

</button><button class="pro" onclick="payPro()">💳 PRO

</button></div><video id="video" controls></video>

<p style="font-size:12px">#viral #reels #trending #shopindia #marketing #instagramreels #viralvideo

</p></div><script>

function showShop(){

document.getElementById("shopBox").style.display="block"
document.getElementById("creatorBox").style.display="none"

}

function showCreator(){

document.getElementById("shopBox").style.display="none"
document.getElementById("creatorBox").style.display="block"

}

function shopVideo(){

let file=document.getElementById("shopImage").files[0]

if(!file){
alert("Image upload karo")
return
}

let reader=new FileReader()

reader.onload=function(){

createVideo(reader.result)

}

reader.readAsDataURL(file)

}

function generateReel(){

createVideo(null)

}

function createVideo(img){

let canvas=document.createElement("canvas")

canvas.width=360
canvas.height=640

let ctx=canvas.getContext("2d")

let stream=canvas.captureStream(30)

let rec=new MediaRecorder(stream)

let chunks=[]

rec.ondataavailable=e=>chunks.push(e.data)

rec.onstop=()=>{

let blob=new Blob(chunks,{type:"video/webm"})

let url=URL.createObjectURL(blob)

video.src=url

}

rec.start()

let text=document.getElementById("script").value

let image=new Image()

if(img) image.src=img

let y=600

let draw=setInterval(()=>{

ctx.fillStyle="black"
ctx.fillRect(0,0,360,640)

if(img){

ctx.drawImage(image,0,0,360,640)

}

ctx.fillStyle="white"
ctx.font="24px sans-serif"

ctx.fillText(text,20,y)

y-=2

},30)

setTimeout(()=>{

clearInterval(draw)

rec.stop()

},8000)

}

function downloadVideo(){

let a=document.createElement("a")

a.href=video.src

a.download="reel.webm"

a.click()

}

function payPro(){

var options={

key:"YOUR_RAZORPAY_KEY",

amount:9900,

currency:"INR",

name:"DABIX PRO",

description:"Pro Upgrade"

}

var rzp=new Razorpay(options)

rzp.open()

}

</script></body></html>
