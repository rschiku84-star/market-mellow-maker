<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dabix Master Studio</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script src="https://code.responsivevoice.org/responsivevoice.js"></script>
    <style>
        :root { --neon: #00f2ff; --bg: #050505; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding: 15px; }
        .card { max-width: 450px; margin: auto; background: #111; padding: 25px; border-radius: 30px; border: 1px solid #333; }
        .main-btn { width: 100%; padding: 18px; border-radius: 15px; border: none; font-weight: 900; cursor: pointer; background: var(--neon); color: #000; text-transform: uppercase; margin-top: 15px; }
        textarea { width: 100%; padding: 15px; margin-bottom: 12px; border-radius: 12px; background: #1a1a1a; color: #fff; border: 1px solid #444; box-sizing: border-box; font-size: 16px; }
        #output { width: 100%; height: 420px; background: #000; border-radius: 20px; margin-top: 20px; display: none; border: 2px solid var(--neon); overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <div class="card">
        <h2 style="color:var(--neon)">🚀 DABIX VIDEO ENGINE</h2>
        <textarea id="storyTxt" rows="5" placeholder="Yahan apni viral story likhein..."></textarea>
        
        <button class="main-btn" onclick="generateVideo()">🎬 GENERATE VIRAL REEL</button>

        <div id="output">
            <video id="v-player" loop playsinline autoplay muted></video>
        </div>

        <button class="main-btn" style="background:#ffcc00; margin-top:20px;" onclick="startPay()">💎 UNLOCK PRO (₹199)</button>
    </div>

    <script>
        async function generateVideo() {
            const v = document.getElementById('v-player');
            const txt = document.getElementById('storyTxt').value;
            const zone = document.getElementById('output');

            if(!txt) return alert("Pehle story likho!");
            zone.style.display = 'block';

            // Voice Engine
            responsiveVoice.speak(txt, "Hindi Male");

            // Video Engine with your Key
            const API_KEY = "hCRmy5XNPlbrU9Y2JuCrl8gBcJwQwCCgcPUQfuOYjzLh3YMVlyAwRav";
            
            // Logic: Sirf pehla keyword search karega taki error na aaye
            let searchWord = txt.split(" ")[0] || "motivation";

            try {
                const res = await fetch(`https://api.pexels.com/videos/search?query=${searchWord}&per_page=1`, {
                    headers: { Authorization: API_KEY }
                });
                const data = await res.json();
                
                if(data.videos && data.videos.length > 0) {
                    v.src = data.videos[0].video_files[0].link;
                } else {
                    // Backup Video agar search result na mile
                    v.src = "https://player.vimeo.com/external/403425024.sd.mp4?s=d00465342a731d102e342750e3223f6631b0a793&profile_id=139";
                }
            } catch(err) {
                // Failsafe Video
                v.src = "https://player.vimeo.com/external/403425024.sd.mp4?s=d00465342a731d102e342750e3223f6631b0a793&profile_id=139";
            }
            v.play();
        }

        function startPay() {
            var options = {
                "key": "rzp_test_SPotf8L7S7I5pS", 
                "amount": "19900",
                "name": "Dabix Pro",
                "handler": function(res){ alert("Payment Success!"); },
                "theme": { "color": "#00f2ff" }
            };
            new Razorpay(options).open();
        }
    </script>
</body>
</html>
