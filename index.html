<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Reel Maker</title>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>

body{
background:#0f172a;
font-family:sans-serif;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
color:white;
}

.box{
background:#1e293b;
padding:30px;
border-radius:10px;
width:300px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border-radius:5px;
border:none;
}

button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:5px;
cursor:pointer;
}

.generate{
background:#22c55e;
color:white;
}

.pay{
background:#f59e0b;
color:white;
}

</style>

</head>

<body>

<div class="box">

<h2>AI Reel Maker</h2>

<input id="product" placeholder="Product Name">

<input id="price" placeholder="Price">

<input type="file">

<button class="generate" onclick="generateReel()">Generate Reel</button>

<button class="pay" onclick="payNow()">Pay ₹199 & Download</button>

</div>

<script>

let trialCount = localStorage.getItem("trial") || 0;

function generateReel(){

trialCount++;

localStorage.setItem("trial",trialCount);

if(trialCount <= 3){

alert("Free Trial Reel Generated ✅");

}else{

alert("Free trial finished. Please pay ₹199");

}

}

function payNow(){

var options = {

key: "rzp_test_xxxxxxxx",

amount: 19900,

currency: "INR",

name: "AI Reel Maker",

description: "Monthly Plan",

handler: function (response){

alert("Payment Successful ✅");

}

};

var rzp = new Razorpay(options);

rzp.open();

}

</script>

</body>
</html>
