apiKey:"AIzaSyCH0r1dDjoZxOvoLqdSc0",
authDomain:"ai-reel-maker-48d49.firebaseapp.com",
projectId:"ai-reel-maker-48d49",
storageBucket:"ai-reel-maker-48d49.appspot.com",
messagingSenderId:"407387852483",
appId:"1:407387852483:web:ac65998"
};

window.login=function(){

"Hook: Stop scrolling!\n\n"+

document.getElementById("script").innerText=text;

let text=document.getElementById("script").innerText;

window.makeVideo=function(){

let product=document.getElementById("product").value
let price=document.getElementById("price").value
let offer=document.getElementById("offer").value
let file=document.getElementById("image").files[0]

if(!file){
alert("Upload image")
return
}

let canvas=document.getElementById("canvas")
let ctx=canvas.getContext("2d")

let img=new Image()

img.onload=function(){

let stream=canvas.captureStream(30)
let recorder=new MediaRecorder(stream)
let chunks=[]

recorder.ondataavailable=e=>chunks.push(e.data)

recorder.onstop=e=>{

let blob=new Blob(chunks,{type:"video/webm"})
let url=URL.createObjectURL(blob)

document.getElementById("video").src=url

let dl=document.getElementById("download")
dl.href=url
dl.download="reel.webm"
dl.style.display="block"

}

recorder.start()

ctx.fillStyle="black"
ctx.fillRect(0,0,720,1280)

ctx.drawImage(img,60,200,600,600)

ctx.fillStyle="white"
ctx.font="60px Arial"
ctx.fillText(product,80,150)

ctx.font="50px Arial"
ctx.fillText("₹"+price,80,950)

ctx.fillStyle="yellow"
ctx.fillText(offer,80,1050)

setTimeout(()=>{
recorder.stop()
},3000)

}

img.src=URL.createObjectURL(file)

}
