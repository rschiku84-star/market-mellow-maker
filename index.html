<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Studio</title>

<style>

body{
background:#0f0f0f;
color:white;
font-family:sans-serif;
text-align:center;
}

button{
padding:14px;
margin:10px;
border:none;
border-radius:8px;
background:#2aa198;
color:white;
font-size:16px;
}

textarea{
width:90%;
height:100px;
background:#222;
color:white;
border:none;
padding:10px;
border-radius:8px;
}

video{
width:90%;
margin-top:20px;
border-radius:10px;
}

</style>
<meta name="google-site-verification" content="tz6SYsEWl2Jkda4SSuDw_tY_HmA9bPBqdgRGuVJC_oA" />
</head>

<body>

<h1>STUDIO</h1>

<button onclick="showShop()">Shop Mode</button>
<button onclick="showCreator()">Creator Mode</button>

<div id="shopBox" style="display:none">

<input type="file" id="shopImage">
<br>
<button onclick="shopVideo()">Generate Shop Reel</button>

</div>

<div id="creatorBox">

<textarea id="script" placeholder="Script likho..."></textarea>

<br>

<button onclick="generateReel()">🔥 GENERATE REEL</button>

</div>

<br>

<button onclick="downloadVideo()">⬇ DOWNLOAD</button>

<br>

<button onclick="pay()">💳 BUY PRO</button>

<br>

<video id="video" controls></video>

<audio id="music" src="https://cdn.pixabay.com/audio/2022/03/15/audio_7f7c33c6a2.mp3"></audio>

<script>

let isPro=false

function pay(){

window.location.href="upi://pay?pa=9660785143-2@axl&pn=STUDIO&am=99&cu=INR"

setTimeout(()=>{

isPro=true
alert("Pro unlocked")

},3000)

}

function showShop(){
document.getElementById("shopBox").style.display="block"
document.getElementById("creatorBox").style.display="none"
}

function showCreator(){
document.getElementById("shopBox").style.display="none"
document.getElementById("creatorBox").style.display="block"
}

function shopVideo(){

let file=document.getElementById("shopImage").files[0]

if(!file){
alert("Image upload karo")
return
}

let reader=new FileReader()

reader.onload=function(){
createLocalVideo(reader.result)
}

reader.readAsDataURL(file)

}

function generateReel(){

let prompt=document.getElementById("script").value

if(!prompt){
alert("Script likho")
return
}

createLocalVideo()

}

function createLocalVideo(img){

let canvas=document.createElement("canvas")

canvas.width=360
canvas.height=640

let ctx=canvas.getContext("2d")

let stream=canvas.captureStream(30)

let rec=new MediaRecorder(stream)

let chunks=[]

rec.ondataavailable=e=>chunks.push(e.data)

rec.onstop=()=>{

let blob=new Blob(chunks,{type:"video/webm"})

let url=URL.createObjectURL(blob)

document.getElementById("video").src=url

}

rec.start()

document.getElementById("music").play()

let text=document.getElementById("script").value

let image=new Image()

if(img) image.src=img

let y=600

let draw=setInterval(()=>{

ctx.fillStyle="black"
ctx.fillRect(0,0,360,640)

if(img){
ctx.drawImage(image,40,100,280,280)
}

ctx.fillStyle="white"
ctx.font="30px sans-serif"
ctx.fillText(text,40,y)

y-=2

},30)

setTimeout(()=>{

clearInterval(draw)
rec.stop()

},30000)

}

function downloadVideo(){

if(!isPro){
alert("Pro purchase karo")
return
}

let video=document.getElementById("video")

if(!video.src){
alert("Pehle video banao")
return
}

let a=document.createElement("a")

a.href=video.src
a.download="reel.webm"
a.click()

}

</script>

</body>
</html>
