<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Studio - Payment Fixed</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script src="https://code.responsivevoice.org/responsivevoice.js"></script>
    <style>
        :root { --neon: #00f2ff; --gold: #ffcc00; --bg: #050505; }
        body { background: var(--bg); font-family: 'Poppins', sans-serif; color: white; text-align: center; padding: 15px; }
        .card { max-width: 450px; margin: auto; background: #111; padding: 25px; border-radius: 25px; border: 1px solid #333; box-shadow: 0 0 30px rgba(0,242,255,0.2); }
        .btn { width: 100%; padding: 18px; border: none; border-radius: 15px; font-weight: 900; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        .btn-gen { background: var(--neon); color: #000; }
        .btn-pay { background: var(--gold); color: #000; border: 2px solid #fff; animation: glow 1.5s infinite; }
        @keyframes glow { 0% { box-shadow: 0 0 5px var(--gold); } 50% { box-shadow: 0 0 20px var(--gold); } 100% { box-shadow: 0 0 5px var(--gold); } }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; background: #222; color: #fff; border: 1px solid #444; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="color: var(--neon);">🚀 Viral AI & Shop</h2>
    
    <textarea id="mainText" rows="3" placeholder="Apni Story ya Product ka naam likhein..."></textarea>
    
    <button class="btn btn-gen" onclick="generateContent()">🎬 Create Viral Reel</button>

    <hr style="border: 0.5px solid #333; margin: 20px 0;">

    <div id="payment-area">
        <p style="font-size: 14px; color: var(--gold);">⭐ Unlock Pro Features & High Quality</p>
        <button class="btn btn-pay" onclick="payNow()">💳 PAY & UPGRADE (₹199)</button>
    </div>

    <div id="status" style="margin-top: 15px; font-size: 12px; color: #888;"></div>
</div>

<script>
    // 1. PAYMENT FUNCTION (Razorpay Integration)
    function payNow() {
        const options = {
            "key": "rzp_test_SPotf8L7S7I5pS", // Aapki Test Key
            "amount": "19900", // ₹199.00 (paise mein)
            "currency": "INR",
            "name": "Manik AI Studio",
            "description": "Pro Membership Activation",
            "image": "https://cdn-icons-png.flaticon.com/512/616/616408.png",
            "handler": function (response) {
                alert("Payment Success! Payment ID: " + response.razorpay_payment_id);
                document.getElementById('status').innerText = "✅ PRO ACTIVE: " + response.razorpay_payment_id;
                document.getElementById('payment-area').innerHTML = "<b style='color:var(--neon)'>🌟 PRO MODE ACTIVATED</b>";
            },
            "prefill": {
                "name": "Manik Chaudhary",
                "email": "manik@example.com"
            },
            "theme": { "color": "#00f2ff" }
        };
        const rzp1 = new Razorpay(options);
        rzp1.open();
    }

    // 2. VIDEO GENERATION (Simple placeholder for testing)
    async function generateContent() {
        const text = document.getElementById('mainText').value;
        if(!text) return alert("Pehle kuch likhein!");
        
        document.getElementById('status').innerText = "⏳ Generating... (Payment check karein)";
        // Yahan aapka Pexels wala logic aayega
    }
</script>

</body>
</html>
