<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Reel Maker</title>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:#1e293b;
padding:30px;
border-radius:10px;
text-align:center;
width:320px;
}

input{
width:90%;
padding:10px;
margin:8px;
border:none;
border-radius:6px;
}

button{
padding:10px 20px;
background:#22c55e;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

.hidden{
display:none;
}

.small{
font-size:13px;
color:#cbd5f5;
}
</style>
</head>

<body>

<div class="box" id="loginBox">

<h2>AI Reel Maker</h2>

<input id="email" placeholder="Enter Email">

<button onclick="login()">Start Free Trial</button>

<p class="small">Free trial: 3 reels</p>

<button onclick="pay()">Upgrade ₹199 / Month</button>

</div>


<div class="box hidden" id="appBox">

<h3>Create Reel</h3>

<input placeholder="Product Name">
<input type="number" placeholder="Price">
<input type="file">

<br><br>

<button onclick="generate()">Generate Reel</button>

<p id="trialText" class="small"></p>

</div>



<script>

let trialLimit = 3;

function login(){

let email=document.getElementById("email").value;

if(email){

localStorage.setItem("user",email);

if(!localStorage.getItem("trial")){
localStorage.setItem("trial",trialLimit);
}

checkAccess();

}

}

function checkAccess(){

let paid = localStorage.getItem("paid");

if(paid=="yes" || localStorage.getItem("trial")>0){

document.getElementById("loginBox").classList.add("hidden");
document.getElementById("appBox").classList.remove("hidden");

updateTrialText();

}

}

function updateTrialText(){

let trial = localStorage.getItem("trial");

if(localStorage.getItem("paid")=="yes"){

document.getElementById("trialText").innerText="Unlimited Access";

}else{

document.getElementById("trialText").innerText="Free reels left: "+trial;

}

}

function generate(){

let paid = localStorage.getItem("paid");

let trial = localStorage.getItem("trial");

if(paid=="yes"){

alert("Reel Generated!");

}else{

if(trial>0){

trial--;

localStorage.setItem("trial",trial);

alert("Reel Generated (Trial)");

updateTrialText();

}else{

alert("Trial finished. Please upgrade.");

}

}

}

function pay(){

var options = {

"key": "rzp_test_YOURKEYHERE",

"amount": "19900",

"currency": "INR",

"name": "AI Reel Maker",

"description": "Monthly Access",

handler: function (){

localStorage.setItem("paid","yes");

alert("Payment Successful");

checkAccess();

}

};

var rzp = new Razorpay(options);

rzp.open();

}

checkAccess();

</script>

</body>
</html>
