<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dabix AI Studio</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script src="https://code.responsivevoice.org/responsivevoice.js"></script>
    <style>
        :root { --neon: #00f2ff; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; padding: 15px; }
        .card { max-width: 450px; margin: auto; background: #111; padding: 25px; border-radius: 30px; border: 1px solid #333; box-shadow: 0 0 20px rgba(0,242,255,0.2); }
        textarea { width: 100%; padding: 15px; border-radius: 15px; background: #1a1a1a; color: #fff; border: 1px solid #444; margin-bottom: 15px; box-sizing: border-box; }
        .btn { width: 100%; padding: 18px; border-radius: 15px; border: none; font-weight: 900; cursor: pointer; background: var(--neon); color: #000; text-transform: uppercase; margin-top: 10px; }
        #videoBox { width: 100%; height: 450px; background: #000; border-radius: 20px; margin-top: 20px; display: none; border: 2px solid var(--neon); overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <div class="card">
        <h2>🚀 DABIX AI STUDIO</h2>
        <textarea id="scriptTxt" rows="3" placeholder="Yahan apni viral script likhein..."></textarea>
        
        <button class="btn" onclick="makeVideo()">🎬 GENERATE AI VIDEO</button>
        
        <div id="videoBox">
            <video id="mainVid" loop playsinline></video>
        </div>

        <button class="btn" style="background:#ffcc00; margin-top:20px;" onclick="startPay()">💳 UNLOCK FULL APP (₹199)</button>
    </div>

    <script>
        async function makeVideo() {
            const txt = document.getElementById('scriptTxt').value;
            if(!txt) return alert("Bhai, script toh likho!");

            document.getElementById('videoBox').style.display = 'block';
            
            // Fixed Video Engine (Using your Pexels Key)
            const pexelsKey = "hCRmy5XNPlbrU9Y2JuCrl8gBcJwQwCCgcPUQfuOYjzLh3YMVlyAwRav";
            try {
                const res = await fetch('https://api.pexels.com/videos/search?query=motivation&per_page=1', {
                    headers: { Authorization: pexelsKey }
                });
                const data = await res.json();
                const video = document.getElementById('mainVid');
                video.src = data.videos[0].video_files[0].link;
                video.play();
                
                // Voice Engine Fix
                responsiveVoice.speak(txt, "Hindi Male");
            } catch(e) {
                alert("Video load nahi hui, API check karein.");
            }
        }

        function startPay() {
            // Fixed Razorpay Logic
            var options = {
                "key": "rzp_test_SPotf8L7S7I5pS", // Isko apni live key se badal lena baad mein
                "amount": "19900", 
                "name": "Dabix AI Studio",
                "handler": function(response) {
                    alert("Shabaash! Payment Success ID: " + response.razorpay_payment_id);
                }
            };
            var rzp = new Razorpay(options);
            rzp.open();
        }
    </script>
</body>
</html>
